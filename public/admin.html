<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d'  } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen flex text-sm">
    
    <!-- Sidebar Left -->
    <aside class="w-64 bg-gray-900 text-white min-h-screen flex flex-col shadow-xl flex-shrink-0 z-50 hidden md:flex sticky top-0 h-screen">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-2xl font-extrabold tracking-tighter text-primary-500">RGS <span class="text-white">ADMIN</span></h1>
        </div>
        <nav class="flex-grow p-4 space-y-2 pb-24 overflow-y-auto">
            <button onclick="switchTab('dashboard')" id="btn-tab-dashboard" class="admin-tab w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-primary-600 text-white font-medium transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                Dashboard
            </button>
            <button onclick="switchTab('products')" id="btn-tab-products" class="admin-tab w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 text-gray-300 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                Manajemen Produk
            </button>
            <button onclick="switchTab('orders')" id="btn-tab-orders" class="admin-tab w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 text-gray-300 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                Pesanan Masuk
            </button>
        </nav>
        <div class="p-4 border-t border-gray-800 mt-auto">
             <button onclick="logout()" class="w-full text-center px-4 py-2 border border-red-500 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition font-medium">Logout Admin</button>
        </div>
    </aside>

    <!-- Main Content Right -->
    <main class="flex-grow flex flex-col w-full overflow-hidden">
        
        <!-- Mobile Topbar -->
        <header class="bg-gray-900 text-white p-4 flex justify-between items-center md:hidden h-16 sticky top-0 z-40">
            <h1 class="text-xl font-extrabold tracking-tighter text-primary-500">RGS <span class="text-white">ADMIN</span></h1>
            <button onclick="logout()" class="text-xs border px-2 py-1 rounded">Logout</button>
        </header>
        
        <!-- Mobile Nav Tabs -->
        <div class="flex overflow-x-auto bg-white border-b shadow-sm md:hidden p-2 space-x-2 sticky top-16 z-30">
            <button onclick="switchTab('dashboard')" class="admin-tab-mob px-4 py-2 rounded bg-primary-100 text-primary-700 font-bold text-xs" id="mob-tab-dashboard">Dashboard</button>
            <button onclick="switchTab('products')" class="admin-tab-mob px-4 py-2 rounded bg-gray-100 text-gray-600 font-bold text-xs" id="mob-tab-products">Produk</button>
            <button onclick="switchTab('orders')" class="admin-tab-mob px-4 py-2 rounded bg-gray-100 text-gray-600 font-bold text-xs" id="mob-tab-orders">Pesanan</button>
        </div>

        <div class="p-4 md:p-8 overflow-y-auto flex-grow relative pb-24">
            
            <!-- TAB: Dashboard -->
            <div id="tab-dashboard" class="tab-content active animate-fade-in">
                <h2 class="text-2xl font-bold mb-6">Overview Statistik</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-gray-500 font-medium mb-1 flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-blue-500"></div> Total Penjualan</div>
                        <div class="text-3xl font-extrabold text-blue-600" id="stat-revenue">Rp 0</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-gray-500 font-medium mb-1 flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-primary-500"></div> Total Pesanan</div>
                        <div class="text-3xl font-extrabold text-gray-800" id="stat-orders">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-gray-500 font-medium mb-1 flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-yellow-500"></div> Produk Aktif</div>
                        <div class="text-3xl font-extrabold text-gray-800" id="stat-products">0</div>
                    </div>
                </div>
            </div>

            <!-- TAB: Produk -->
            <div id="tab-products" class="tab-content animate-fade-in">
                <div class="flex flex-col md:flex-row justify-between mb-6">
                    <h2 class="text-2xl font-bold mb-4 md:mb-0">Manajemen Produk</h2>
                    <button onclick="openFormModal()" class="bg-primary-500 hover:bg-primary-600 text-white font-bold py-2.5 px-5 rounded-lg shadow transition">+ Tambah Produk Baru</button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 font-semibold text-gray-600 w-16 text-center">No</th>
                                <th class="p-4 font-semibold text-gray-600">Info Produk</th>
                                <th class="p-4 font-semibold text-gray-600">Harga Jual</th>
                                <th class="p-4 font-semibold text-gray-600">Diskon</th>
                                <th class="p-4 font-semibold text-gray-600">Stok</th>
                                <th class="p-4 font-semibold text-gray-600 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-products" class="divide-y divide-gray-100">
                            <!-- Injected rows -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TAB: Pesanan -->
            <div id="tab-orders" class="tab-content animate-fade-in">
                <h2 class="text-2xl font-bold mb-6">Daftar Pesanan Masuk</h2>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                    <table class="w-full text-left min-w-[900px]">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 font-semibold text-gray-600">ID / Waktu</th>
                                <th class="p-4 font-semibold text-gray-600">Pelanggan</th>
                                <th class="p-4 font-semibold text-gray-600">Item</th>
                                <th class="p-4 font-semibold text-gray-600">Total</th>
                                <th class="p-4 font-semibold text-gray-600 text-center">Status</th>
                                <th class="p-4 font-semibold text-gray-600 text-center">Aksi (Kirim)</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-orders" class="divide-y divide-gray-100">
                            <!-- Injected order rows -->
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Modal Form Product -->
    <div id="modal-product" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col transform scale-95 transition-transform" id="modal-product-inner">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                <h3 class="font-bold text-gray-800 text-lg" id="modal-product-title">Tambah Produk</h3>
                <button onclick="closeFormModal()" class="text-gray-400 hover:text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-6 overflow-y-auto flex-grow">
                <form id="form-admin-product" class="space-y-4">
                    <input type="hidden" id="form-id">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Nama Produk</label>
                            <input type="text" id="form-name" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Kategori</label>
                            <select id="form-category" class="w-full px-3 py-2 border rounded-lg focus:ring-2 bg-white">
                                <option value="Streaming">Streaming</option>
                                <option value="Music">Music</option>
                                <option value="Game">Game</option>
                                <option value="Discord">Discord</option>
                                <option value="Productivity">Productivity</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Varian (Pisahkan koma)</label>
                            <input type="text" id="form-variants" placeholder="1 Bulan, 3 Bulan" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Harga Asli (Rp)</label>
                            <input type="number" id="form-price" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                             <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Diskon (%)</label>
                                <input type="number" id="form-discount" value="0" min="0" max="100" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none">
                             </div>
                             <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Stok Aktif</label>
                                <input type="number" id="form-stock" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none">
                             </div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Deskripsi & Aturan</label>
                            <textarea id="form-desc" rows="3" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none"></textarea>
                        </div>
                        
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Image Thumbnail (Base64/URL)</label>
                            <div class="flex gap-2">
                                <input type="file" id="form-file" accept="image/*" class="w-1/2 text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-primary-50 file:text-primary-700 hover:file:bg-primary-100">
                                <input type="text" id="form-image-data" placeholder="atau paste URL" required class="w-1/2 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none text-xs">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="p-4 border-t bg-gray-50 rounded-b-2xl flex justify-end gap-2">
                <button onclick="closeFormModal()" class="px-4 py-2 font-medium bg-white border rounded-lg text-gray-600 hover:bg-gray-100 transition">Batal</button>
                <button type="submit" form="form-admin-product" class="px-4 py-2 font-bold bg-primary-500 text-white rounded-lg shadow hover:bg-primary-600 transition">Simpan Produk</button>
            </div>
        </div>
    </div>

    <!-- Core App Logic -->
    <script src="js/app.js"></script>
    <script>
        // Check admin
        function checkAdminAuth() {
            const user = appUtils.getCurrentUser();
            if(!user || user.role !== 'admin') {
                window.location.href = 'auth.html';
                return false;
            }
            return true;
        }

        // TAB MNGMT
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // Menu stylings desktop
            document.querySelectorAll('.admin-tab').forEach(el => {
                el.classList.remove('bg-primary-600', 'text-white');
                el.classList.add('text-gray-300', 'hover:bg-gray-800');
            });
            const activeDesk = document.getElementById('btn-tab-' + tabId);
            if(activeDesk) {
                activeDesk.classList.add('bg-primary-600', 'text-white');
                activeDesk.classList.remove('text-gray-300', 'hover:bg-gray-800');
            }

            // Menu stylings mobile
             document.querySelectorAll('.admin-tab-mob').forEach(el => {
                el.classList.remove('bg-primary-100', 'text-primary-700');
                el.classList.add('text-gray-600', 'bg-gray-100');
            });
            const activeMob = document.getElementById('mob-tab-' + tabId);
            if(activeMob) {
                activeMob.classList.add('bg-primary-100', 'text-primary-700');
                activeMob.classList.remove('text-gray-600', 'bg-gray-100');
            }
        }

        // RENDER DATA
        function loadDashboard() {
            const products = appUtils.getProducts();
            const orders = appUtils.getOrders();

            // Stats
            const totalRev = orders.filter(o => o.status === 'Success').reduce((sum, o) => sum + o.totalPrice, 0);
            document.getElementById('stat-revenue').textContent = appUtils.formatRupiah(totalRev);
            document.getElementById('stat-orders').textContent = orders.length;
            document.getElementById('stat-products').textContent = products.length;

            renderProductsTable(products);
            renderOrdersTable(orders);
        }

        function renderProductsTable(products) {
            const tbody = document.getElementById('admin-table-products');
            tbody.innerHTML = '';
            
            products.forEach((p, idx) => {
                tbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="p-4 text-center text-gray-500">${idx+1}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <img src="${p.image}" class="w-10 h-10 rounded border object-cover">
                            <div>
                                <p class="font-bold text-gray-800 line-clamp-1">${p.name}</p>
                                <span class="bg-gray-100 px-1.5 py-0.5 rounded text-[10px] uppercase font-bold text-gray-500">${p.category}</span>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 font-semibold text-primary-600">${appUtils.formatRupiah(p.finalPrice)}</td>
                    <td class="p-4 text-center">
                        ${p.discount > 0 ? `<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold">-${p.discount}%</span>` : '-'}
                    </td>
                    <td class="p-4">
                        <span class="px-2 py-1 ${p.stock > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} rounded text-xs font-bold">${p.stock}</span>
                    </td>
                    <td class="p-4 text-right space-x-2">
                        <button onclick="editProduct('${p.id}')" class="text-xs bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded font-semibold transition">Edit</button>
                        <button onclick="deleteProduct('${p.id}')" class="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded font-semibold transition">Hapus</button>
                    </td>
                </tr>`;
            });
        }

        function renderOrdersTable(orders) {
            const tbody = document.getElementById('admin-table-orders');
            tbody.innerHTML = '';
            
            // Sort by latest
            orders.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((o) => {
                const dateFmt = new Date(o.date).toLocaleDateString('id', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                const isSuccess = o.status === 'Success';
                
                tbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="p-4">
                        <p class="font-bold text-gray-800">${o.orderId}</p>
                        <p class="text-[10px] text-gray-500">${dateFmt}</p>
                    </td>
                    <td class="p-4 text-xs font-medium text-gray-600">${o.userEmail}<br><span class="text-gray-400">Via: ${o.paymentMethod}</span></td>
                    <td class="p-4 text-xs">
                        <span class="break-words line-clamp-2">${o.items.map(it => `[${it.qty}x] ${it.name}`).join(', ')}</span>
                    </td>
                    <td class="p-4 font-bold text-primary-600">${appUtils.formatRupiah(o.totalPrice)}</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${isSuccess ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-yellow-100 text-yellow-700 border border-yellow-200'}">${o.status}</span>
                    </td>
                    <td class="p-4 text-center">
                        ${!isSuccess ? `<button onclick="processOrder('${o.orderId}')" class="text-xs bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded shadow-sm font-bold transition">Proses & Kirim</button>` : `<span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">Selesai</span>`}
                    </td>
                </tr>`;
            });
        }

        // CRUD ACTIONS
        function processOrder(orderId) {
            const text = prompt("Masukkan detail informasi Lisensi/Akun (Email, Password, atau Link Invite):");
            if(text && text.trim() !== '') {
                const orders = appUtils.getOrders();
                const idx = orders.findIndex(o => o.orderId === orderId);
                if(idx > -1) {
                    orders[idx].status = 'Success';
                    orders[idx].credentialsDelivered = text;
                    appUtils.saveOrders(orders);
                    appUtils.showToast('Pesanan berhasil diproses dan dikirim!');
                    loadDashboard();
                }
            } else {
                alert("Pengiriman dibatalkan. Lisensi tidak boleh kosong!");
            }
        }

        function deleteProduct(id) {
            if(confirm('Yakin ingin menghapus produk ini?')) {
                let products = appUtils.getProducts();
                products = products.filter(p => p.id !== id);
                appUtils.saveProducts(products);
                loadDashboard();
                appUtils.showToast('Berhasil dihapus', 'success');
            }
        }

        // MODAL LOGIC
        const modal = document.getElementById('modal-product');
        const fileInput = document.getElementById('form-file');
        const imgDataInput = document.getElementById('form-image-data');
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(file) {
                const b64 = await appUtils.convertImageToBase64(file);
                imgDataInput.value = b64;
            }
        });

        function openFormModal(product = null) {
            document.getElementById('form-admin-product').reset();
            if(product) {
                 document.getElementById('modal-product-title').textContent = "Edit Produk";
                 document.getElementById('form-id').value = product.id;
                 document.getElementById('form-name').value = product.name;
                 document.getElementById('form-category').value = product.category;
                 document.getElementById('form-variants').value = product.variants ? product.variants.join(', ') : '';
                 document.getElementById('form-price').value = product.originalPrice;
                 document.getElementById('form-discount').value = product.discount;
                 document.getElementById('form-stock').value = product.stock;
                 document.getElementById('form-desc').value = product.description;
                 document.getElementById('form-image-data').value = product.image;
            } else {
                 document.getElementById('modal-product-title').textContent = "Tambah Produk";
                 document.getElementById('form-id').value = '';
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-product-inner').classList.remove('scale-95');
            }, 10);
        }

        function closeFormModal() {
            modal.classList.add('opacity-0');
            document.getElementById('modal-product-inner').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function editProduct(id) {
            const products = appUtils.getProducts();
            const product = products.find(p => p.id === id);
            if(product) openFormModal(product);
        }

        document.getElementById('form-admin-product').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('form-id').value || 'prod-' + Date.now();
            const name = document.getElementById('form-name').value;
            const category = document.getElementById('form-category').value;
            const variantsRaw = document.getElementById('form-variants').value;
            const vars = variantsRaw ? variantsRaw.split(',').map(v=>v.trim()).filter(v=>v) : [];
            const price = parseInt(document.getElementById('form-price').value);
            const discount = parseInt(document.getElementById('form-discount').value);
            const stock = parseInt(document.getElementById('form-stock').value);
            const desc = document.getElementById('form-desc').value;
            const image = document.getElementById('form-image-data').value;

            const finalPrice = Math.round(price - (price * (discount/100)));

            const newProd = {
                id, name, category, variants: vars, originalPrice: price, discount, finalPrice, stock, description: desc, image
            };

            const products = appUtils.getProducts();
            const existIdx = products.findIndex(p => p.id === id);
            
            if(existIdx > -1) products[existIdx] = newProd;
            else products.push(newProd);

            appUtils.saveProducts(products);
            appUtils.showToast('Data produk tersimpan');
            closeFormModal();
            loadDashboard();
        });

        function logout() {
             localStorage.removeItem('currentUser');
             window.location.href = 'auth.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(checkAdminAuth()) {
                loadDashboard();
            }
        });
    </script>
</body>
</html>
