<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center h-16 relative">
                <a href="cart.html" class="absolute left-0 flex items-center text-gray-500 hover:text-primary-600 font-medium transition">
                    <svg class="w-6 h-6 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Batal
                </a>
                <h1 class="mx-auto text-lg font-bold text-gray-800">Checkout</h1>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <form id="form-checkout" class="flex flex-col md:flex-row gap-8 items-start">
            
            <div class="w-full md:w-2/3 space-y-6">
                <!-- Info Penagihan -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-6 h-6 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs mr-2">1</span>
                        Data Penerima
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                            <input type="text" id="co-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-xs text-gray-400 font-normal">(Lisensi/Akun dikirim ke email ini)</span></label>
                            <input type="email" id="co-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Handphone (Opsional)</label>
                            <input type="text" id="co-phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition">
                        </div>
                    </div>
                </div>

                <!-- Metode Pembayaran -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-6 h-6 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs mr-2">2</span>
                        Pilih Pembayaran
                    </h3>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
                        <label class="border rounded-xl p-3 cursor-pointer hover:bg-gray-50 flex flex-col items-center justify-center text-center payment-option transition relative">
                            <input type="radio" name="payment" value="QRIS" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500" required checked>
                            <span class="font-bold text-primary-600 mb-1">QRIS</span>
                            <span class="text-xs text-gray-500">Otomatis dicek</span>
                        </label>
                        <label class="border rounded-xl p-3 cursor-pointer hover:bg-gray-50 flex flex-col items-center justify-center text-center payment-option transition relative">
                            <input type="radio" name="payment" value="BCA Transfer" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500">
                            <span class="font-bold text-blue-800 mb-1">BCA Transfer</span>
                            <span class="text-xs text-gray-500">Verifikasi Manual</span>
                        </label>
                        <label class="border rounded-xl p-3 cursor-pointer hover:bg-gray-50 flex flex-col items-center justify-center text-center payment-option transition relative">
                            <input type="radio" name="payment" value="E-Wallet (OVO/DANA)" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500">
                            <span class="font-bold text-purple-600 mb-1">E-Wallet</span>
                            <span class="text-xs text-gray-500">OVO / DANA</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Total Bar -->
            <div class="w-full md:w-1/3 sticky top-24">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 mb-4 pb-2 border-b">Detail Pembayaran</h3>
                    <div id="checkout-items" class="space-y-3 mb-4 max-h-48 overflow-y-auto pr-2 text-sm">
                        <!-- Injected -->
                    </div>
                    
                    <div class="space-y-2 mb-4 border-t pt-4 text-sm text-gray-600">
                        <div class="flex justify-between">
                            <span>Subtotal</span>
                            <span id="co-subtotal" class="font-medium text-gray-800">Rp 0</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Biaya Admin</span>
                            <span class="font-medium text-green-500">Gratis</span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col mb-6 bg-gray-50 p-3 rounded-lg border">
                        <span class="text-xs text-gray-500 mb-1 font-semibold uppercase">Total Tagihan</span>
                        <span id="co-total" class="font-extrabold text-xl text-primary-600">Rp 0</span>
                    </div>

                    <p class="text-xs text-gray-400 mb-4 text-center">Dengan menekan tombol bayar, Anda menyetujui Syarat & Ketentuan yang berlaku.</p>
                    <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl transition shadow flex items-center justify-center">
                        Bayar Sekarang <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>
            
        </form>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cart = appUtils.getCart();
            if(cart.length === 0) {
                window.location.href = 'index.html'; // Prevent manual visit via URL if empty
            }

            // Auto-fill if user logged in
            const user = appUtils.getCurrentUser();
            if(user) {
                document.getElementById('co-name').value = user.name;
                document.getElementById('co-email').value = user.email;
            }

            // Render Items Summary
            const container = document.getElementById('checkout-items');
            let total = 0;
            
            cart.forEach(item => {
                const sub = item.qty * item.price;
                total += sub;
                container.innerHTML += `
                    <div class="flex justify-between text-gray-600">
                        <span class="truncate pr-2">${item.qty}x ${item.name} <span class="text-[10px] bg-gray-100 rounded px-1">${item.variant}</span></span>
                        <span class="font-medium text-gray-800">${appUtils.formatRupiah(sub)}</span>
                    </div>
                `;
            });

            document.getElementById('co-subtotal').textContent = appUtils.formatRupiah(total);
            document.getElementById('co-total').textContent = appUtils.formatRupiah(total);

            // Handle Submit Action
            document.getElementById('form-checkout').addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Get form data
                const email = document.getElementById('co-email').value;
                const method = document.querySelector('input[name="payment"]:checked').value;
                
                // Fetch existing DB
                const products = appUtils.getProducts();
                let history = appUtils.getOrders();
                
                // Deduct stock safely
                cart.forEach(cItem => {
                    const idx = products.findIndex(p => p.id === cItem.id);
                    if(idx > -1) {
                        products[idx].stock = Math.max(0, products[idx].stock - cItem.qty);
                    }
                });
                appUtils.saveProducts(products); // Commit stock

                // Build Order object
                const newOrder = {
                    orderId: 'INV-' + Date.now(),
                    date: new Date().toISOString(),
                    userEmail: email,
                    items: cart,
                    paymentMethod: method,
                    totalPrice: total,
                    status: 'Pending', // pending until admin changes it to Success
                    credentialsDelivered: null
                };

                // Save Order
                history.push(newOrder);
                appUtils.saveOrders(history);
                
                // Clear state
                appUtils.saveCart([]);

                // Fake Loading
                appUtils.showToast('Memproses transaksi...', 'success');
                setTimeout(() => {
                    window.location.href = user && user.role === 'admin' ? 'admin.html' : 'dashboard.html';
                }, 1500);
            });
            
            // Payment selection UI 
            const paymentRadios = document.querySelectorAll('input[name="payment"]');
            paymentRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('border-primary-500', 'bg-primary-50'));
                    if(e.target.checked) {
                        e.target.parentElement.classList.add('border-primary-500', 'bg-primary-50');
                    }
                });
                
                // trigger for initial checked state
                if(radio.checked) {
                    radio.parentElement.classList.add('border-primary-500', 'bg-primary-50');
                }
            });
        });
    </script>
</body>
</html>
