<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Checkout aman di RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl, checkout">
    <meta name="robots" content="noindex, follow">
    <meta property="og:title" content="Checkout — RGS STORE">
    <title>Checkout - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#fff7ed',100:'#ffedd5',500:'#f97316',600:'#ea6c10',700:'#c2410c' } }, fontFamily: { sans: ['Outfit','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-lg shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center h-16 relative">
                <a href="index.html" class="absolute left-0 flex items-center text-gray-500 hover:text-primary-600 font-medium transition text-sm">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Kembali
                </a>
                <h1 class="mx-auto text-lg font-bold text-gray-800">Checkout</h1>
            </div>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="checkout-loading" class="max-w-4xl mx-auto px-4 py-20 text-center">
        <svg class="animate-spin h-10 w-10 text-primary-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <p class="text-gray-400 text-sm">Memuat data checkout...</p>
    </div>

    <!-- Main Content (hidden until loaded) -->
    <main id="checkout-content" class="max-w-4xl mx-auto px-4 py-8 hidden">
        <form id="form-checkout" class="flex flex-col md:flex-row gap-8 items-start">
            <div class="w-full md:w-2/3 space-y-6">

                <!-- Data Penerima -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-7 h-7 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs font-bold mr-2">1</span>
                        Data Penerima
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                            <input type="text" id="co-name" readonly class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-600">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Email <span class="text-xs text-gray-400 font-normal">(Lisensi dikirim ke email ini)</span></label>
                            <input type="email" id="co-email" readonly class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-600">
                        </div>
                    </div>
                </div>

                <!-- Produk -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-7 h-7 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs font-bold mr-2">2</span>
                        Detail Produk
                    </h3>
                    <div id="checkout-product-detail" class="flex flex-col gap-2">
                        <!-- Injected -->
                    </div>
                </div>

                <!-- Metode Pembayaran -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-7 h-7 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs font-bold mr-2">3</span>
                        Pilih Pembayaran
                    </h3>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="border-2 rounded-xl p-4 cursor-pointer hover:bg-orange-50 flex flex-col items-center justify-center text-center payment-option transition relative border-primary-500 bg-primary-50">
                            <input type="radio" name="payment" value="QRIS" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500" required checked>
                            <span class="font-bold text-primary-600 text-sm">🔲 QRIS</span>
                            <span class="text-[10px] text-gray-500 mt-0.5">Scan & Pay</span>
                        </label>
                        <label class="border-2 rounded-xl p-4 cursor-pointer hover:bg-orange-50 flex flex-col items-center justify-center text-center payment-option transition relative border-gray-200" id="ewallet-label">
                            <input type="radio" name="payment" value="E-Wallet" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500" id="radio-ewallet">
                            <span class="font-bold text-purple-600 text-sm">💜 E-Wallet</span>
                            <span class="text-[10px] text-gray-500 mt-0.5">DANA / OVO / GoPay / ShopeePay</span>
                        </label>
                    </div>
                    <!-- E-Wallet Sub-Dropdown -->
                    <div id="ewallet-dropdown-wrapper" class="mt-4 hidden">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Pilih Aplikasi E-Wallet</label>
                        <select id="ewallet-select" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition text-sm bg-white">
                            <option value="">-- Pilih E-Wallet --</option>
                            <option value="DANA">DANA</option>
                            <option value="OVO">OVO</option>
                            <option value="GoPay">GoPay</option>
                            <option value="ShopeePay">ShopeePay</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Summary Sidebar -->
            <div class="w-full md:w-1/3 sticky top-24">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 mb-4 pb-3 border-b">Ringkasan Pesanan</h3>
                    <div class="space-y-2 mb-4 text-sm text-gray-600">
                        <div class="flex justify-between"><span>Subtotal</span><span id="co-subtotal" class="font-medium text-gray-800">Rp 0</span></div>
                        <div class="flex justify-between"><span>Biaya Admin</span><span class="font-medium text-green-500">Gratis</span></div>
                    </div>
                    <div class="flex flex-col mb-6 bg-orange-50 p-4 rounded-xl border border-orange-100">
                        <span class="text-xs text-gray-500 mb-1 font-semibold uppercase">Total Tagihan</span>
                        <span id="co-total" class="font-extrabold text-2xl text-primary-600">Rp 0</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mb-4 text-center leading-relaxed">Dengan menekan tombol bayar, Anda menyetujui Syarat &amp; Ketentuan yang berlaku.</p>
                    <button type="submit" id="btn-pay" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl transition-all shadow hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        Bayar Sekarang
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </button>
                </div>
            </div>
        </form>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!appUtils.requireLogin()) return;

            const user = appUtils.getSavedUser();
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            let checkoutItems = [];
            let totalPrice = 0;

            try {
                if (productId) {
                    const product = await appUtils.getProductById(productId);
                    if (!product) throw new Error('Produk tidak ditemukan');
                    const price = parseInt(product.final_price || product.price);
                    const variant = urlParams.get('variant') || null;
                    checkoutItems.push({ product_id: product.id, name: product.name, price, qty: 1, variant });
                    totalPrice = price;
                } else {
                    const cart = appUtils.getCart();
                    if (cart.length === 0) { window.location.href = 'cart.html'; return; }
                    checkoutItems = cart.map(item => ({
                        product_id: item.id, name: item.name,
                        price: parseInt(item.price), qty: parseInt(item.qty), variant: item.variant || null
                    }));
                    totalPrice = checkoutItems.reduce((acc, item) => acc + (item.price * item.qty), 0);
                }

                document.getElementById('co-name').value = user.name;
                document.getElementById('co-email').value = user.email;

                const detailContainer = document.getElementById('checkout-product-detail');
                detailContainer.innerHTML = '';
                checkoutItems.forEach(item => {
                    detailContainer.insertAdjacentHTML('beforeend', `
                        <div class="flex items-center gap-4 py-3 border-b border-gray-50 last:border-0 w-full">
                            <div class="flex-grow">
                                <p class="font-semibold text-gray-800 text-sm">${item.name}</p>
                                <p class="text-[10px] text-gray-400">Qty: ${item.qty}${item.variant ? ` • Varian: ${item.variant}` : ''}</p>
                            </div>
                            <p class="font-bold text-gray-700 text-sm whitespace-nowrap">${appUtils.formatRupiah(item.price * item.qty)}</p>
                        </div>
                    `);
                });

                document.getElementById('co-subtotal').textContent = appUtils.formatRupiah(totalPrice);
                document.getElementById('co-total').textContent = appUtils.formatRupiah(totalPrice);

                document.getElementById('checkout-loading').classList.add('hidden');
                document.getElementById('checkout-content').classList.remove('hidden');

            } catch (err) {
                console.error('Checkout Load Error:', err);
                document.getElementById('checkout-loading').innerHTML = `
                    <div class="p-6 bg-red-50 border border-red-100 rounded-2xl">
                        <p class="text-red-500 font-bold">Terjadi Kesalahan</p>
                        <p class="text-red-400 text-xs mt-1">${err.message || 'Gagal memuat data.'}</p>
                        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-orange-500 text-white rounded-lg text-sm">Coba Lagi 🔄</button>
                    </div>`;
                return;
            }

            // Payment option selection UI
            const paymentRadios = document.querySelectorAll('input[name="payment"]');
            paymentRadios.forEach(radio => {
                radio.addEventListener('change', () => {
                    document.querySelectorAll('.payment-option').forEach(el => {
                        el.classList.remove('border-primary-500', 'bg-primary-50', 'bg-orange-50');
                        el.classList.add('border-gray-200');
                    });
                    if (radio.checked) {
                        radio.parentElement.classList.add('border-primary-500', 'bg-orange-50');
                        radio.parentElement.classList.remove('border-gray-200');
                    }

                    // Show/hide E-Wallet dropdown
                    const ewalletWrapper = document.getElementById('ewallet-dropdown-wrapper');
                    if (radio.id === 'radio-ewallet' && radio.checked) {
                        ewalletWrapper.classList.remove('hidden');
                    } else if (radio.id !== 'radio-ewallet') {
                        ewalletWrapper.classList.add('hidden');
                        document.getElementById('ewallet-select').value = '';
                    }
                });
            });

            // Submit Order
            document.getElementById('form-checkout').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-pay');
                let selectedMethod = document.querySelector('input[name="payment"]:checked')?.value;

                if (!selectedMethod) {
                    appUtils.showToast('Silakan pilih metode pembayaran.', 'error');
                    return;
                }

                // If E-Wallet selected, get sub-type
                if (selectedMethod === 'E-Wallet') {
                    const ewalletType = document.getElementById('ewallet-select').value;
                    if (!ewalletType) {
                        Swal.fire('Pilih E-Wallet', 'Silakan pilih salah satu layanan e-wallet (DANA, OVO, dll).', 'warning');
                        return;
                    }
                    selectedMethod = `E-Wallet (${ewalletType})`;
                }

                if (checkoutItems.length === 0 || isNaN(totalPrice) || totalPrice <= 0) {
                    appUtils.showToast('Gagal memproses data belanja. Silakan coba lagi.', 'error');
                    return;
                }

                try {
                    appUtils.setLoading(btn, true, 'Memproses...');
                    const payload = {
                        customer_name: user.name,
                        customer_email: user.email,
                        items: checkoutItems,
                        total_price: totalPrice,
                        payment_method: selectedMethod
                    };

                    const result = await appUtils.createOrder(payload);
                    if (result.success) {
                        appUtils.showToast('Pesanan berhasil dibuat! 🔥', 'success');
                        if (!productId) appUtils.saveCart([]);
                        setTimeout(() => {
                            window.location.href = result.data?.order?.id
                                ? `payment.html?order_id=${result.data.order.id}`
                                : 'my-orders.html';
                        }, 1200);
                    } else {
                        appUtils.showToast(result.message || 'Gagal membuat pesanan.', 'error');
                        appUtils.setLoading(btn, false);
                    }
                } catch (err) {
                    console.error('Order Error:', err);
                    appUtils.showToast('Koneksi terputus. Coba lagi.', 'error');
                    appUtils.setLoading(btn, false);
                }
            });
        });
    </script>
