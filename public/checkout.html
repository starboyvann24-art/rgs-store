<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d' } }, fontFamily: { sans: ['Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-lg shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center h-16 relative">
                <a href="index.html" class="absolute left-0 flex items-center text-gray-500 hover:text-primary-600 font-medium transition text-sm">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Kembali
                </a>
                <h1 class="mx-auto text-lg font-bold text-gray-800">Checkout</h1>
            </div>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="checkout-loading" class="max-w-4xl mx-auto px-4 py-20 text-center">
        <svg class="animate-spin h-10 w-10 text-primary-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <p class="text-gray-400 text-sm">Memuat data checkout...</p>
    </div>

    <!-- Main Content (hidden until loaded) -->
    <main id="checkout-content" class="max-w-4xl mx-auto px-4 py-8 hidden">
        <form id="form-checkout" class="flex flex-col md:flex-row gap-8 items-start">
            <div class="w-full md:w-2/3 space-y-6">
                <!-- Data Penerima -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-7 h-7 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs font-bold mr-2">1</span>
                        Data Penerima
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                            <input type="text" id="co-name" readonly class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-600">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Email <span class="text-xs text-gray-400 font-normal">(Lisensi dikirim ke email ini)</span></label>
                            <input type="email" id="co-email" readonly class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-600">
                        </div>
                    </div>
                </div>

                <!-- Produk -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-7 h-7 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs font-bold mr-2">2</span>
                        Detail Produk
                    </h3>
                    <div id="checkout-product-detail" class="flex items-center gap-4">
                        <!-- Injected -->
                    </div>
                </div>

                <!-- Metode Pembayaran -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                        <span class="w-7 h-7 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs font-bold mr-2">3</span>
                        Pilih Pembayaran
                    </h3>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
                        <label class="border-2 rounded-xl p-4 cursor-pointer hover:bg-gray-50 flex flex-col items-center justify-center text-center payment-option transition relative border-primary-500 bg-primary-50">
                            <input type="radio" name="payment" value="QRIS" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500" required checked>
                            <span class="font-bold text-primary-600 text-sm">QRIS</span>
                            <span class="text-[10px] text-gray-500 mt-0.5">Semua e-wallet</span>
                        </label>
                        <label class="border-2 rounded-xl p-4 cursor-pointer hover:bg-gray-50 flex flex-col items-center justify-center text-center payment-option transition relative border-gray-200">
                            <input type="radio" name="payment" value="BCA Transfer" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500">
                            <span class="font-bold text-blue-800 text-sm">BCA Transfer</span>
                            <span class="text-[10px] text-gray-500 mt-0.5">Verifikasi manual</span>
                        </label>
                        <label class="border-2 rounded-xl p-4 cursor-pointer hover:bg-gray-50 flex flex-col items-center justify-center text-center payment-option transition relative border-gray-200">
                            <input type="radio" name="payment" value="E-Wallet (OVO/DANA)" class="absolute top-2 right-2 text-primary-600 focus:ring-primary-500">
                            <span class="font-bold text-purple-600 text-sm">E-Wallet</span>
                            <span class="text-[10px] text-gray-500 mt-0.5">OVO / DANA</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Summary Sidebar -->
            <div class="w-full md:w-1/3 sticky top-24">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 mb-4 pb-3 border-b">Ringkasan Pesanan</h3>
                    <div class="space-y-2 mb-4 text-sm text-gray-600">
                        <div class="flex justify-between"><span>Subtotal</span><span id="co-subtotal" class="font-medium text-gray-800">Rp 0</span></div>
                        <div class="flex justify-between"><span>Biaya Admin</span><span class="font-medium text-green-500">Gratis</span></div>
                    </div>
                    <div class="flex flex-col mb-6 bg-gray-50 p-4 rounded-xl border">
                        <span class="text-xs text-gray-500 mb-1 font-semibold uppercase">Total Tagihan</span>
                        <span id="co-total" class="font-extrabold text-2xl text-primary-600">Rp 0</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mb-4 text-center leading-relaxed">Dengan menekan tombol bayar, Anda menyetujui Syarat & Ketentuan yang berlaku.</p>
                    <button type="submit" id="btn-pay" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl transition-all shadow hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        Bayar Sekarang
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </button>
                </div>
            </div>
        </form>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Guard: must be logged in
            if (!appUtils.requireAuth()) return;

            const user = appUtils.getSavedUser();

            // Get product ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                window.location.href = 'index.html';
                return;
            }

            // Load product from API
            const product = await appUtils.getProductById(productId);

            if (!product) {
                document.getElementById('checkout-loading').innerHTML = '<p class="text-red-500 font-semibold">Produk tidak ditemukan.</p><a href="index.html" class="text-primary-600 hover:underline text-sm mt-2 inline-block">Kembali</a>';
                return;
            }

            const price = parseInt(product.final_price);
            const imgSrc = product.image_url || 'https://via.placeholder.com/100x100?text=No+Image';

            // Fill form with user data
            document.getElementById('co-name').value = user.name;
            document.getElementById('co-email').value = user.email;

            // Fill product detail
            document.getElementById('checkout-product-detail').innerHTML = `
                <img src="${imgSrc}" class="w-16 h-16 rounded-xl object-cover border border-gray-100 shadow-sm" alt="${product.name}">
                <div class="flex-grow">
                    <p class="font-semibold text-gray-800">${product.name}</p>
                    <p class="text-xs text-gray-500">${product.category}</p>
                </div>
                <p class="font-bold text-primary-600 text-lg">${appUtils.formatRupiah(price)}</p>
            `;

            // Fill totals
            document.getElementById('co-subtotal').textContent = appUtils.formatRupiah(price);
            document.getElementById('co-total').textContent = appUtils.formatRupiah(price);

            // Show content, hide loading
            document.getElementById('checkout-loading').classList.add('hidden');
            document.getElementById('checkout-content').classList.remove('hidden');

            // Payment selection UI
            const paymentRadios = document.querySelectorAll('input[name="payment"]');
            paymentRadios.forEach(radio => {
                radio.addEventListener('change', () => {
                    document.querySelectorAll('.payment-option').forEach(el => { el.classList.remove('border-primary-500', 'bg-primary-50'); el.classList.add('border-gray-200'); });
                    if (radio.checked) { radio.parentElement.classList.add('border-primary-500', 'bg-primary-50'); radio.parentElement.classList.remove('border-gray-200'); }
                });
            });

            // Submit Order
            document.getElementById('form-checkout').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-pay');
                const method = document.querySelector('input[name="payment"]:checked').value;

                btn.disabled = true;
                btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Memproses...';

                const result = await appUtils.createOrder(product.id, 1, method);

                if (result.success) {
                    appUtils.showToast('Pesanan berhasil! Menuju WhatsApp...', 'success');

                    // Use WA URL from API response
                    const waUrl = result.data.whatsapp_url;

                    setTimeout(() => {
                        window.location.href = waUrl;
                    }, 1500);
                } else {
                    appUtils.showToast(result.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Bayar Sekarang <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>';
                }
            });
        });
    </script>
</body>
</html>
