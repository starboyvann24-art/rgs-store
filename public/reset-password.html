<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Reset Password - RGS STORE</title>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' }, secondary: { 500: '#d946ef' }, dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' } }, fontFamily: { sans: ['Outfit','Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-white text-black font-sans antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="w-full max-w-md animate-fade-in relative z-10">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <h1 class="text-3xl font-black text-black tracking-tighter uppercase">RGS <span style="color:#ff7a00;">STORE</span></h1>
            </a>
            <h1 class="text-2xl font-black uppercase tracking-tight text-black">Reset <span>Password</span></h1>
        </div>

        <div id="reset-loading" class="p-8 text-center flex flex-col items-center">
             <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Validating Token Link...</p>
        </div>

        <div id="reset-form-container" class="hidden">
            <div class="p-8 rounded-3xl border border-gray-100 shadow-2xl bg-white">
                <form id="form-reset" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">New Password</label>
                        <input type="password" id="new_password" required placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-4 text-black focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
                        <input type="password" id="confirm_password" required placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-4 text-black focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                    </div>
                    
                    <button type="submit" id="btn-reset" class="w-full bg-black text-white font-black py-4 rounded-xl transition-all shadow-lg hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                        Update Password
                    </button>
                </form>
            </div>
        </div>

        <div id="reset-error" class="hidden">
            <div class="glass-card p-8 rounded-3xl border border-red-500/20 bg-red-500/5 text-center">
                <span class="text-4xl mb-4 block">⚠️</span>
                <h3 class=" font-bold mb-2">Token Tidak Valid</h3>
                <p id="error-msg" class="text-slate-400 text-sm mb-6">Token reset password Anda sudah kedaluwarsa atau tidak valid.</p>
                <a href="login.html" class="inline-block px-6 py-2.5 bg-white/10  font-bold rounded-xl hover:bg-white/20 transition text-sm">Kembali ke Login</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/reset-password.js"></script>
<!-- Floating WhatsApp -->
<a href="https://wa.me/62882016259591" target="_blank" class="wa-float" title="WhatsApp CS">
    <i class="fa-brands fa-whatsapp"></i>
</a>
</body>
</html>
