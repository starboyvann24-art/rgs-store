<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Reset Password - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md animate-fade-in">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/20">
                    <span class="text-white font-black text-sm">RGS</span>
                </div>
                <span class="font-bold text-2xl tracking-tight text-white">RGS<span class="text-orange-500">STORE</span></span>
            </a>
            <h1 class="text-2xl font-black text-white">Reset Password Anda</h1>
            <p class="text-slate-400 mt-2 text-sm">Masukkan password baru untuk akun Anda.</p>
        </div>

        <div id="reset-loading" class="glass-card p-8 rounded-3xl border border-white/10 text-center flex flex-col items-center">
             <div class="w-10 h-10 border-4 border-white/5 border-t-orange-500 rounded-full animate-spin mb-4"></div>
             <p class="text-sm text-slate-400">Memverifikasi token...</p>
        </div>

        <div id="reset-form-container" class="hidden">
            <div class="glass-card p-8 rounded-3xl border border-white/10 shadow-2xl shadow-black/50">
                <form id="form-reset" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Password Baru</label>
                        <input type="password" id="new_password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all placeholder:text-slate-700">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Konfirmasi Password</label>
                        <input type="password" id="confirm_password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all placeholder:text-slate-700">
                    </div>
                    
                    <button type="submit" id="btn-reset" class="w-full bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-orange-500/20 active:scale-95 flex items-center justify-center gap-2">
                        Simpan Password Baru
                    </button>
                </form>
            </div>
        </div>

        <div id="reset-error" class="hidden">
            <div class="glass-card p-8 rounded-3xl border border-red-500/20 bg-red-500/5 text-center">
                <span class="text-4xl mb-4 block">⚠️</span>
                <h3 class="text-white font-bold mb-2">Token Tidak Valid</h3>
                <p id="error-msg" class="text-slate-400 text-sm mb-6">Token reset password Anda sudah kedaluwarsa atau tidak valid.</p>
                <a href="login.html" class="inline-block px-6 py-2.5 bg-white/10 text-white font-bold rounded-xl hover:bg-white/20 transition text-sm">Kembali ke Login</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/reset-password.js"></script>

</html>
