<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d' } }, fontFamily: { sans: ['Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-72 h-72 bg-primary-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
    <div class="absolute -bottom-20 -left-20 w-72 h-72 bg-primary-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-md relative z-10 border border-gray-100">
        <div class="text-center mb-8">
            <a href="index.html"><h1 class="text-3xl font-extrabold text-primary-600 tracking-tight mb-2">RGS <span class="text-gray-800">STORE</span></h1></a>
            <p class="text-sm text-gray-500">Selamat datang kembali! Silakan login.</p>
        </div>

        <form id="form-login" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
                <input type="email" id="login-email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition" placeholder="contoh@email.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                <input type="password" id="login-password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition" placeholder="••••••••">
            </div>
            <button type="submit" id="btn-submit" class="w-full bg-primary-500 text-white font-bold py-3.5 rounded-xl shadow hover:bg-primary-600 hover:-translate-y-0.5 hover:shadow-lg transition-all">
                Masuk Sekarang
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-500">Belum punya akun? <a href="register.html" class="text-primary-600 hover:underline font-bold">Daftar disini</a></p>


    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            const user = appUtils.getSavedUser();
            window.location.href = user && user.role === 'admin' ? 'admin.html' : 'index.html';
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white inline mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Logging in...';

                const res = await appUtils.login(
                    document.getElementById('login-email').value,
                    document.getElementById('login-password').value
                );

                if (res.success) {
                    appUtils.showToast('Login berhasil!', 'success');
                    setTimeout(() => {
                        const user = res.data.user;
                        window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                    }, 800);
                } else {
                    appUtils.showToast(res.message, 'error');
                }
            } catch (err) {
                console.error('Login Error:', err);
                appUtils.showToast('Terjadi kesalahan saat login. Coba lagi.', 'error');
            } finally {
                // Ensure button is reset even on crash
                const resuccess = (appUtils.getToken() !== null);
                if (!resuccess) {
                    btn.disabled = false;
                    btn.innerHTML = 'Masuk Sekarang';
                }
            }
        });
    </script>
</body>
</html>
