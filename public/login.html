<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login ke RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="login, RGS STORE, marketplace digital">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Login — RGS STORE">
    <title>Login - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' }, dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' } }, fontFamily: { sans: ['Outfit','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="font-sans min-h-screen flex items-center justify-center relative overflow-hidden" style="background:#ffffff !important; color:#000000 !important;">

    <div class="p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border" style="background:#ffffff; border:1px solid #e5e7eb; color:#000000;">
        <div class="text-center mb-8">
            <a href="index.html"><h1 class="text-3xl font-black tracking-tight mb-2" style="color:#ff7a00;">RGS <span style="color:#000000;">STORE</span></h1></a>
            <p class="text-sm" style="color:#4b5563;">Selamat datang kembali! Silakan login.</p>
        </div>

        <form id="form-login" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#374151;">Email</label>
                <input type="email" id="login-email" required class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f9fafb; border:1px solid #d1d5db; color:#000000;" placeholder="contoh@email.com">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#374151;">Password</label>
                <input type="password" id="login-password" required class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f9fafb; border:1px solid #d1d5db; color:#000000;" placeholder="••••••••">
            </div>
            <div class="flex justify-end">
                <a href="#" id="forgot-password-link" class="text-xs font-semibold hover:underline" style="color:#ff7a00;">Lupa Password?</a>
            </div>
            <button type="submit" id="btn-submit" class="w-full font-bold py-3.5 rounded-xl shadow transition-all" style="background:#ff7a00; color:#ffffff;">
                Masuk Sekarang
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
            <div class="flex-1 h-px" style="background:#e5e7eb;"></div>
            <span class="text-xs font-semibold" style="color:#6b7280;">ATAU</span>
            <div class="flex-1 h-px" style="background:#e5e7eb;"></div>
        </div>

        <!-- Discord Login Button -->
        <a href="/api/auth/discord" id="btn-discord-login"
           class="w-full flex items-center justify-center gap-3 py-3 px-5 rounded-xl font-semibold transition-all" style="background:#5865f2; color:#ffffff; border:none; text-decoration:none;">
            <!-- Discord Logo SVG -->
            <svg width="22" height="22" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg" fill="#ffffff">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
            Login dengan Discord
        </a>

        <p class="mt-6 text-center text-sm" style="color:#4b5563;">Belum punya akun? <a href="register.html" class="font-bold hover:underline" style="color:#ff7a00;">Daftar disini</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            const user = appUtils.getSavedUser();
            window.location.href = user && user.role === 'admin' ? 'admin.html' : 'index.html';
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');

            try {
                btn.disabled = true;
                btn.innerHTML = 'Logging in...';

                const res = await appUtils.login(
                    document.getElementById('login-email').value,
                    document.getElementById('login-password').value
                );

                if (res.success) {
                    appUtils.showToast('Login berhasil!', 'success');
                    setTimeout(() => {
                        const user = res.data.user;
                        window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                    }, 800);
                } else {
                    appUtils.showToast(res.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Masuk Sekarang';
                }
            } catch (err) {
                console.error('Login Error:', err);
                appUtils.showToast('Terjadi kesalahan saat login. Coba lagi.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Masuk Sekarang';
            }
        });

        // Forgot Password - Swal instead of prompt
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const { value: email } = await Swal.fire({
                title: 'Reset Password',
                input: 'email',
                inputLabel: 'Masukkan email akun Anda',
                inputPlaceholder: 'contoh@email.com',
                showCancelButton: true,
                cancelButtonText: 'Batal',
                confirmButtonText: 'Kirim Link Reset',
                confirmButtonColor: '#ff7a00',
                background: '#ffffff',
                color: '#000000'
            });
            if (email) {
                const res = await appUtils.forgotPassword(email);
                Swal.fire({
                    icon: res.success ? 'success' : 'error',
                    title: res.success ? 'Email Terkirim!' : 'Gagal',
                    text: res.message,
                    confirmButtonColor: '#f97316'
                });
            }
        });
    </script>
    <footer style="position: absolute; bottom: 1.5rem; text-align: center; width: 100%; font-size: 0.75rem; color: #9ca3af;">
        Dev by <span style="font-weight: 800; color: #000000;">E_vann</span> | RGS STORE © 2026
    </footer>
</body>
</html>
