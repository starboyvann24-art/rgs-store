<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login ke RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="login, RGS STORE, marketplace digital">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Login — RGS STORE">
    <title>Login - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' }, dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' } }, fontFamily: { sans: ['Outfit','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="font-sans min-h-screen flex items-center justify-center relative overflow-hidden" style="background:#ffffff !important; color:#000000 !important;">

    <div class="p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border" style="background:#ffffff; border:1px solid #e0e0e0; color:#000000;">
        <div class="text-center mb-8">
            <a href="index.html"><h1 class="text-3xl font-black tracking-tight mb-2" style="color:#ff7a00;">RGS <span style="color:#000000;">STORE</span></h1></a>
            <p class="text-sm" style="color:#555555;">Selamat datang kembali! Silakan login.</p>
        </div>

        <form id="form-login" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#000000;">Email</label>
                <input type="email" id="login-email" required class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f8f9fa; border:1px solid #d1d5db; color:#000000;" placeholder="contoh@email.com">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#000000;">Password</label>
                <input type="password" id="login-password" required class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f8f9fa; border:1px solid #d1d5db; color:#000000;" placeholder="••••••••">
            </div>
            <div class="flex justify-end">
                <a href="#" id="forgot-password-link" class="text-xs font-semibold hover:underline" style="color:#ff7a00;">Lupa Password?</a>
            </div>
            <button type="submit" id="btn-submit" class="w-full font-bold py-3.5 rounded-xl shadow transition-all" style="background:#ff7a00; color:#ffffff;">
                Masuk Sekarang
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
            <div class="flex-1 h-px" style="background:#e0e0e0;"></div>
            <span class="text-xs font-semibold" style="color:#555555;">ATAU</span>
            <div class="flex-1 h-px" style="background:#e0e0e0;"></div>
        </div>

        <!-- Google Login Button -->
        <a href="/api/auth/google" id="btn-google-login"
           class="w-full flex items-center justify-center gap-3 py-3 px-5 rounded-xl font-semibold transition-all" style="border:2px solid #e0e0e0; color:#000000; background:#ffffff;">
            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Login dengan Google
        </a>

        <p class="mt-6 text-center text-sm" style="color:#555555;">Belum punya akun? <a href="register.html" class="font-bold hover:underline" style="color:#ff7a00;">Daftar disini</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            const user = appUtils.getSavedUser();
            window.location.href = user && user.role === 'admin' ? 'admin.html' : 'index.html';
        }

        // Handle google_token in URL (redirect from Google OAuth)
        const urlParams = new URLSearchParams(window.location.search);
        const googleToken = urlParams.get('google_token');
        const googleRole = urlParams.get('role');
        if (googleToken) {
            appUtils.saveToken(googleToken);
            appUtils.showToast('Login Google berhasil! 🎉', 'success');
            setTimeout(() => {
                window.location.href = googleRole === 'admin' ? 'admin.html' : 'index.html';
            }, 800);
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');

            try {
                btn.disabled = true;
                btn.innerHTML = '<svg class="animate-spin h-5 w-5  inline mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Logging in...';

                const res = await appUtils.login(
                    document.getElementById('login-email').value,
                    document.getElementById('login-password').value
                );

                if (res.success) {
                    appUtils.showToast('Login berhasil!', 'success');
                    setTimeout(() => {
                        const user = res.data.user;
                        window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                    }, 800);
                } else {
                    appUtils.showToast(res.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Masuk Sekarang';
                }
            } catch (err) {
                console.error('Login Error:', err);
                appUtils.showToast('Terjadi kesalahan saat login. Coba lagi.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Masuk Sekarang';
            }
        });

        // Forgot Password - Swal instead of prompt
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const { value: email } = await Swal.fire({
                title: 'Reset Password',
                input: 'email',
                inputLabel: 'Masukkan email akun Anda',
                inputPlaceholder: 'contoh@email.com',
                showCancelButton: true,
                cancelButtonText: 'Batal',
                confirmButtonText: 'Kirim Link Reset',
                confirmButtonColor: '#06b6d4'
            });
            if (email) {
                const res = await appUtils.forgotPassword(email);
                Swal.fire({
                    icon: res.success ? 'success' : 'error',
                    title: res.success ? 'Email Terkirim!' : 'Gagal',
                    text: res.message,
                    confirmButtonColor: '#f97316'
                });
            }
        });
    </script>

</body>
</html>
