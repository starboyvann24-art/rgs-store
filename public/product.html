<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
             colors: { primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' } },
             fontFamily: { sans: ['Inter', 'sans-serif'] }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-24 md:pb-0">

    <!-- Simple Navbar -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <!-- Back Button -->
                <a href="index.html" class="flex items-center text-gray-500 hover:text-primary-600 transition font-medium">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Kembali
                </a>
                
                <!-- Right Menu: Cart -->
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="relative text-gray-500 hover:text-primary-600 transition">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Product Detail Content -->
    <main class="max-w-7xl mx-auto px-4 py-6 md:py-12">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" id="product-container">
            <div class="flex flex-col md:flex-row">
                
                <!-- Product Image -->
                <div class="w-full md:w-5/12 bg-gray-50 p-6 flex justify-center items-center h-64 md:h-auto border-b md:border-b-0 md:border-r border-gray-100" id="product-img-wrapper">
                    <!-- Skeleton -->
                    <div class="w-full h-full bg-gray-200 animate-pulse rounded-xl"></div>
                </div>

                <!-- Product Info & Actions -->
                <div class="w-full md:w-7/12 p-6 md:p-8 flex flex-col justify-between">
                    <div>
                        <div class="flex items-center space-x-2 mb-2">
                           <span id="product-category" class="px-2.5 py-1 bg-gray-100 text-gray-600 text-[10px] uppercase font-bold rounded">...</span>
                           <span id="product-stock-badge" class="px-2.5 py-1 text-[10px] uppercase font-bold rounded">...</span>
                        </div>
                        <h1 id="product-name" class="text-2xl md:text-3xl font-bold text-gray-900 mb-2 leading-tight">Memuat Data...</h1>
                        
                        <div class="flex items-end mb-6" id="product-price-section">
                            <!-- Injected Price -->
                        </div>

                        <div class="border-t border-gray-100 py-4">
                            <h3 class="font-semibold text-gray-800 mb-2 text-sm uppercase tracking-wide">Deskripsi Produk</h3>
                            <p id="product-desc" class="text-gray-600 text-sm md:text-base leading-relaxed whitespace-pre-line text-justify">
                                <!-- Injected Desc -->
                            </p>
                        </div>

                        <!-- Variants -->
                        <div class="border-t border-gray-100 py-4" id="variants-section">
                            <h3 class="font-semibold text-gray-800 mb-3 text-sm uppercase tracking-wide">Pilih Varian</h3>
                            <div class="flex flex-wrap gap-2" id="variants-container">
                                <!-- Pills Data -->
                            </div>
                        </div>

                    </div>

                    <!-- Fixed Mobile Bottom Bar or Inline Block Desktop -->
                    <div class="fixed md:static bottom-0 left-0 right-0 bg-white md:bg-transparent border-t md:border-t-0 p-4 md:p-0 z-30 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] md:shadow-none flex space-x-3 mt-4">
                        <button id="btn-add-cart" class="flex-1 bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl transition shadow-md flex justify-center items-center focus:ring-4 focus:ring-primary-100 disabled:opacity-50 disabled:bg-gray-400 disabled:cursor-not-allowed">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            Tambah ke Keranjang
                        </button>
                    </div>
                    
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const products = appUtils.getProducts();
            const product = products.find(p => p.id === productId);
            
            let selectedVariant = null;

            if (!product) {
                document.getElementById('product-container').innerHTML = `
                    <div class="p-16 text-center">
                        <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <h2 class="text-2xl font-bold text-gray-700">Produk Tidak Ditemukan</h2>
                        <a href="index.html" class="inline-block mt-4 text-primary-600 hover:underline">Kembali ke Beranda</a>
                    </div>
                `;
                return;
            }

            // Populate Data
            document.getElementById('product-category').textContent = product.category;
            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-desc').textContent = product.description;
            
            const imgWrapper = document.getElementById('product-img-wrapper');
            imgWrapper.innerHTML = `<img src="${product.image}" alt="${product.name}" class="max-w-full max-h-full rounded-lg object-contain shadow-sm animate-fade-in">`;
            
            // Stock Badge & Button Logic
            const btnAddCart = document.getElementById('btn-add-cart');
            const stockBadge = document.getElementById('product-stock-badge');
            
            if (product.stock > 0) {
                stockBadge.textContent = `Tersedia: ${product.stock}`;
                stockBadge.classList.add('bg-green-100', 'text-green-700');
            } else {
                stockBadge.textContent = `Stok Habis`;
                stockBadge.classList.add('bg-red-100', 'text-red-700');
                btnAddCart.disabled = true;
                btnAddCart.innerHTML = 'Stok Habis';
            }

            // Price Section
            const priceSection = document.getElementById('product-price-section');
            if (product.discount > 0) {
                priceSection.innerHTML = `
                    <div>
                        <div class="flex items-center space-x-2">
                            <span class="px-1.5 py-0.5 bg-red-100 text-red-600 text-xs font-bold rounded">-${product.discount}%</span>
                            <span class="text-sm text-gray-400 line-through">${appUtils.formatRupiah(product.originalPrice)}</span>
                        </div>
                        <div class="text-3xl font-extrabold text-primary-600 mt-1">${appUtils.formatRupiah(product.finalPrice)}</div>
                    </div>
                `;
            } else {
                priceSection.innerHTML = `
                    <div class="text-3xl font-extrabold text-primary-600">${appUtils.formatRupiah(product.finalPrice)}</div>
                `;
            }

            // Variants
            const varContainer = document.getElementById('variants-container');
            if(product.variants && product.variants.length > 0) {
                selectedVariant = product.variants[0]; // default select first
                product.variants.forEach((vr) => {
                    const btn = document.createElement('button');
                    btn.className = `variant-btn px-4 py-2 rounded-lg border text-sm font-semibold transition ${vr === selectedVariant ? 'border-primary-500 bg-primary-50 text-primary-600' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}`;
                    btn.textContent = vr;
                    btn.onclick = (e) => {
                        selectedVariant = vr;
                        document.querySelectorAll('.variant-btn').forEach(b => {
                            b.className = 'variant-btn px-4 py-2 rounded-lg border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition';
                        });
                        e.target.className = 'variant-btn px-4 py-2 rounded-lg border border-primary-500 bg-primary-50 text-sm font-semibold text-primary-600 transition';
                    };
                    varContainer.appendChild(btn);
                });
            } else {
                document.getElementById('variants-section').style.display = 'none';
            }

            // Add To Cart Action
            btnAddCart.addEventListener('click', () => {
                const cart = appUtils.getCart();
                
                // Check existing
                const existingIndex = cart.findIndex(c => c.id === product.id && c.variant === selectedVariant);
                
                if (existingIndex !== -1) {
                    if (cart[existingIndex].qty + 1 > product.stock) {
                        appUtils.showToast('Gagal! Melebihi stok yang tersedia', 'error');
                        return;
                    }
                    cart[existingIndex].qty += 1;
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        image: product.image,
                        price: product.finalPrice,
                        variant: selectedVariant,
                        qty: 1
                    });
                }
                
                appUtils.saveCart(cart);
                appUtils.showToast('Produk ditambahkan ke keranjang!', 'success');
            });
        });
    </script>
</body>
</html>
