<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d' } }, fontFamily: { sans: ['Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-72 h-72 bg-primary-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
    <div class="absolute -bottom-20 -left-20 w-72 h-72 bg-primary-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-md relative z-10 border border-gray-100">
        <div class="text-center mb-8">
            <a href="index.html"><h1 class="text-3xl font-extrabold text-primary-600 tracking-tight mb-2">RGS <span class="text-gray-800">STORE</span></h1></a>
            <p class="text-sm text-gray-500">Buat akun untuk mulai berbelanja.</p>
        </div>

        <form id="form-register" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nama Lengkap</label>
                <input type="text" id="reg-name" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
                <input type="email" id="reg-email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition" placeholder="contoh@email.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition" placeholder="Minimal 6 karakter">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">No. WhatsApp <span class="text-xs text-gray-400 font-normal">(opsional)</span></label>
                <input type="text" id="reg-whatsapp" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition" placeholder="08xxxxxxxxxx">
            </div>
            <button type="submit" id="btn-submit" class="w-full bg-primary-500 text-white font-bold py-3.5 rounded-xl shadow hover:bg-primary-600 hover:-translate-y-0.5 hover:shadow-lg transition-all mt-2">
                Daftar Akun
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-500">Sudah punya akun? <a href="login.html" class="text-primary-600 hover:underline font-bold">Masuk disini</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            window.location.href = 'index.html';
        }

        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white inline mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Loading...';

            const res = await appUtils.register(
                document.getElementById('reg-name').value,
                document.getElementById('reg-email').value,
                document.getElementById('reg-password').value,
                document.getElementById('reg-whatsapp').value
            );

            if (res.success) {
                appUtils.showToast('Registrasi berhasil!', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } else {
                appUtils.showToast(res.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Daftar Akun';
            }
        });
    </script>
</body>
</html>
