<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Daftar - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' }, dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' } }, fontFamily: { sans: ['Outfit','Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="font-sans min-h-screen flex items-center justify-center relative overflow-hidden" style="background:#ffffff !important; color:#000000 !important;">

    <div class="p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border" style="background:#ffffff; border:1px solid #e0e0e0; color:#000000;">
        <div class="text-center mb-8">
            <a href="index.html"><h1 class="text-3xl font-black tracking-tighter mb-2 uppercase" style="color:#ff7a00;">RGS <span style="color:#000000;">STORE</span></h1></a>
            <p class="text-xs font-black uppercase tracking-widest leading-relaxed" style="color:#555555;">Buat Akun RGS STORE Baru</p>
        </div>

        <form id="form-register" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-1.5 ml-1" style="color:#000000;">Nama Lengkap</label>
                <input type="text" id="reg-name" required class="w-full px-4 py-3.5 rounded-xl outline-none transition" style="background:#f8f9fa; border:1px solid #d1d5db; color:#000000;" placeholder="Nama Lengkap">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-1.5 ml-1" style="color:#000000;">Email</label>
                <input type="email" id="reg-email" required class="w-full px-4 py-3.5 rounded-xl outline-none transition" style="background:#f8f9fa; border:1px solid #d1d5db; color:#000000;" placeholder="email@domain.com">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-1.5 ml-1" style="color:#000000;">Password</label>
                <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3.5 rounded-xl outline-none transition" style="background:#f8f9fa; border:1px solid #d1d5db; color:#000000;" placeholder="Min. 6 karakter">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-1.5 ml-1" style="color:#000000;">WhatsApp <span class="text-xs font-normal lowercase" style="color:#888888;">(opsional)</span></label>
                <input type="text" id="reg-whatsapp" class="w-full px-4 py-3.5 rounded-xl outline-none transition" style="background:#f8f9fa; border:1px solid #d1d5db; color:#000000;" placeholder="Nomor WhatsApp">
            </div>
            <button type="submit" id="btn-submit" class="w-full font-black py-4 rounded-xl shadow-lg transition-all mt-4 uppercase tracking-wider text-xs" style="background:#ff7a00; color:#ffffff;">
                Daftar Akun
            </button>
        </form>

        <p class="mt-8 text-center text-xs uppercase tracking-widest font-black" style="color:#555555;">Sudah punya akun? <a href="login.html" class="font-black hover:underline" style="color:#ff7a00;">Masuk</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            window.location.href = 'index.html';
        }

        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<svg class="animate-spin h-5 w-5  inline mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Loading...';

                const res = await appUtils.register(
                    document.getElementById('reg-name').value,
                    document.getElementById('reg-email').value,
                    document.getElementById('reg-password').value,
                    document.getElementById('reg-whatsapp').value
                );

                if (res.success) {
                    appUtils.showToast('Registrasi berhasil!', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    appUtils.showToast(res.message, 'error');
                }
            } catch (err) {
                console.error('Register Error:', err);
                appUtils.showToast('Gagal mendaftar. Coba lagi nanti.', 'error');
            } finally {
                const resuccess = (appUtils.getToken() !== null);
                if (!resuccess) {
                    btn.disabled = false;
                    btn.innerHTML = 'Daftar Akun';
                }
            }
        });
    </script>
<!-- Floating WhatsApp -->
<a href="https://wa.me/62882016259591" target="_blank" class="wa-float" title="WhatsApp CS">
    <i class="fa-brands fa-whatsapp"></i>
</a>
</body>
</html>
