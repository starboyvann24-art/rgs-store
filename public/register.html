<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Daftar - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' }, dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' } }, fontFamily: { sans: ['Outfit','Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-black text-gray-100 font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-72 h-72 bg-primary-500/10 rounded-full mix-blend-screen filter blur-3xl opacity-50"></div>
    <div class="absolute -bottom-20 -left-20 w-72 h-72 bg-secondary-500/10 rounded-full mix-blend-screen filter blur-3xl opacity-50"></div>

    <div class="bg-dark-800 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border border-primary-500/10">
        <div class="text-center mb-8">
            <a href="index.html"><h1 class="text-3xl font-black text-primary-500 tracking-tighter mb-2 uppercase">RGS <span class="text-white">STORE</span></h1></a>
            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest leading-relaxed">System Linkage: Initializing User Registration</p>
        </div>

        <form id="form-register" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Identity Protocol</label>
                <input type="text" id="reg-name" required class="w-full px-4 py-3.5 bg-dark-900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500 text-white outline-none transition placeholder-gray-700" placeholder="FULL NAME">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Neural Address</label>
                <input type="email" id="reg-email" required class="w-full px-4 py-3.5 bg-dark-900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500 text-white outline-none transition placeholder-gray-700" placeholder="EMAIL@DOMAIN.COM">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Access Cipher</label>
                <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3.5 bg-dark-900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500 text-white outline-none transition placeholder-gray-700" placeholder="SECURE PASSWORD">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Comm Channel <span class="text-[9px] text-gray-500 font-normal lowercase">(optional)</span></label>
                <input type="text" id="reg-whatsapp" class="w-full px-4 py-3.5 bg-dark-900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500 text-white outline-none transition placeholder-gray-700" placeholder="WHATSAPP NUMBER">
            </div>
            <button type="submit" id="btn-submit" class="w-full bg-primary-500 text-black font-black py-4 rounded-xl shadow-lg shadow-primary-500/20 hover:bg-primary-600 hover:scale-[1.02] transition-all mt-4 uppercase tracking-[0.2em] text-xs">
                Link Neural Account
            </button>
        </form>

        <p class="mt-8 text-center text-xs text-gray-500 uppercase tracking-widest font-black">Connected already? <a href="login.html" class="text-primary-500 hover:text-white transition">ACCESS CORE</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            window.location.href = 'index.html';
        }

        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white inline mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Loading...';

                const res = await appUtils.register(
                    document.getElementById('reg-name').value,
                    document.getElementById('reg-email').value,
                    document.getElementById('reg-password').value,
                    document.getElementById('reg-whatsapp').value
                );

                if (res.success) {
                    appUtils.showToast('Registrasi berhasil!', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    appUtils.showToast(res.message, 'error');
                }
            } catch (err) {
                console.error('Register Error:', err);
                appUtils.showToast('Gagal mendaftar. Coba lagi nanti.', 'error');
            } finally {
                const resuccess = (appUtils.getToken() !== null);
                if (!resuccess) {
                    btn.disabled = false;
                    btn.innerHTML = 'Daftar Akun';
                }
            }
        });
    </script>
<!-- Floating WhatsApp -->
<a href="https://wa.me/62882016259591" target="_blank" class="wa-float" title="WhatsApp CS">
    <i class="fa-brands fa-whatsapp"></i>
</a>
</body>
</html>
