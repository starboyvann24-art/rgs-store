<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Daftar - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' }, dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' } }, fontFamily: { sans: ['Outfit','Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="font-sans min-h-screen flex items-center justify-center relative overflow-hidden" style="background:#ffffff !important; color:#000000 !important;">

    <div class="p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border" style="background:#ffffff; border:1px solid #e5e7eb; color:#000000;">
        <div class="text-center mb-8">
            <a href="index.html"><h1 class="text-3xl font-black tracking-tight mb-2" style="color:#ff7a00;">RGS <span style="color:#000000;">STORE</span></h1></a>
            <p class="text-sm" style="color:#4b5563;">Buat akun baru untuk mulai belanja.</p>
        </div>

        <form id="form-register" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#374151;">Nama Lengkap</label>
                <input type="text" id="reg-name" required class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f9fafb; border:1px solid #d1d5db; color:#000000;" placeholder="Nama Lengkap">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#374151;">Email</label>
                <input type="email" id="reg-email" required class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f9fafb; border:1px solid #d1d5db; color:#000000;" placeholder="email@domain.com">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#374151;">Password</label>
                <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f9fafb; border:1px solid #d1d5db; color:#000000;" placeholder="Min. 6 karakter">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1.5" style="color:#374151;">WhatsApp <span class="text-xs font-normal lowercase" style="color:#6b7280;">(opsional)</span></label>
                <input type="text" id="reg-whatsapp" class="w-full px-4 py-3 rounded-xl outline-none transition" style="background:#f9fafb; border:1px solid #d1d5db; color:#000000;" placeholder="Nomor WhatsApp">
            </div>
            <button type="submit" id="btn-submit" class="w-full font-bold py-3.5 rounded-xl shadow transition-all mt-2" style="background:#ff7a00; color:#ffffff;">
                Daftar Sekarang
            </button>
        </form>

        <p class="mt-6 text-center text-sm" style="color:#4b5563;">Sudah punya akun? <a href="login.html" class="font-bold hover:underline" style="color:#ff7a00;">Masuk</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            window.location.href = 'index.html';
        }

        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            try {
                btn.disabled = true;
                btn.innerHTML = 'Loading...';

                const res = await appUtils.register(
                    document.getElementById('reg-name').value,
                    document.getElementById('reg-email').value,
                    document.getElementById('reg-password').value,
                    document.getElementById('reg-whatsapp').value
                );

                if (res.success) {
                    appUtils.showToast('Registrasi berhasil!', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    appUtils.showToast(res.message, 'error');
                }
            } catch (err) {
                console.error('Register Error:', err);
                appUtils.showToast('Gagal mendaftar. Coba lagi nanti.', 'error');
            } finally {
                const resuccess = (appUtils.getToken() !== null);
                if (!resuccess) {
                    btn.disabled = false;
                    btn.innerHTML = 'Daftar Akun';
                }
            }
        });
    </script>
    <footer style="position: absolute; bottom: 1.5rem; text-align: center; width: 100%; font-size: 0.75rem; color: #9ca3af;">
        Dev by <span style="font-weight: 800; color: #000000;">E_vann</span> | RGS STORE © 2026
    </footer>
</body>
</html>
