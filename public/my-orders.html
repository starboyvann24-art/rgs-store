<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE — Riwayat pesanan digital Anda.">
    <meta name="robots" content="noindex, nofollow">
    <title>Pesanan Saya — RGS STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #000000;
            --text-muted: #64748b;
            --primary: #ff7a00;
            --border: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Outfit', sans-serif; min-height: 100vh; line-height: 1.5; }

        /* ── Navbar ─────────────────────────────────────── */
        .navbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 40;
            padding: 0 1.5rem;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar-brand {
            font-size: 1.25rem; font-weight: 900; letter-spacing: -1px;
            color: #000;
            text-decoration: none;
        }
        .navbar-brand span { color: var(--primary); }
        #nav-auth-container { display: flex; align-items: center; gap: 10px; }

        /* ── Content ─────────────────────────────────────── */
        main { max-width: 860px; margin: 0 auto; padding: 3rem 1.5rem; }

        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 2.5rem; flex-wrap: wrap; gap: 16px;
        }
        .page-title { font-size: 2.25rem; font-weight: 940; color: #000; letter-spacing: -2px; line-height: 1; }
        .page-title span { color: var(--primary); }
        .page-subtitle { font-size: 0.7rem; color: var(--text-muted); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }

        /* ── Loading (No Spinner) ────────────────────────── */
        .loading-wrap { text-align: center; padding: 5rem 0; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; }

        /* ── Empty State ─────────────────────────────────── */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 5rem 2rem;
            background: #fff; border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .empty-icon { font-size: 3rem; margin-bottom: 1.5rem; color: #f1f5f9; }
        .empty-title { font-size: 1.25rem; font-weight: 900; color: #000; letter-spacing: 2px; text-transform: uppercase; }
        .empty-sub { color: var(--text-muted); font-size: 0.8rem; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-start { margin-top: 2rem; padding: 14px 36px; background: #000; color: #fff; font-weight: 900; border-radius: 14px; text-decoration: none; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; transition: transform 0.2s; }
        .btn-start:hover { transform: translateY(-2px); }

        /* ── Floating WA ─────────────────────────────────── */
        .wa-float {
            position: fixed; bottom: 32px; right: 32px;
            width: 56px; height: 56px; background: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #fff; z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.2s; text-decoration: none;
        }
        .wa-float:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">RGS <span>STORE</span></a>
        <div id="auth-nav-container"></div>
    </nav>

    <main>
        <div class="page-header">
            <div>
                <h1 class="page-title">Pesanan <span>Saya</span></h1>
                <p class="page-subtitle">Riwayat transaksi digital Anda</p>
            </div>
            <a href="index.html" style="padding:12px 24px; background:#f8fafc; color:#000; border:1px solid #e2e8f0; border-radius:12px; font-size:0.75rem; font-weight:800; text-decoration:none; letter-spacing:1px; text-transform:uppercase;">← Kembali</a>
        </div>

        <div class="loading-wrap" id="orders-loading">
            Memuat data pesanan...
        </div>

        <div id="orders-container" style="display:none; flex-direction:column; gap:20px;"></div>

        <div id="orders-empty" style="display:none;">
            <div class="empty-state">
                <div class="empty-icon"><i class="fa-solid fa-box-open"></i></div>
                <div class="empty-title">Belum Ada Pesanan</div>
                <div class="empty-sub">Mulai berbelanja di RGS Store</div>
                <a href="index.html" class="btn-start">Mulai Belanja</a>
            </div>
        </div>
    </main>

    <!-- Floating WA -->
    <a href="https://wa.me/62882016259591" target="_blank" class="wa-float" title="WhatsApp CS">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="js/app.js"></script>
    <script src="js/my-orders.js"></script>
</body>
</html>
