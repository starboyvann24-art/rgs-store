<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE — Riwayat pesanan digital Anda.">
    <meta name="robots" content="noindex, nofollow">
    <title>Pesanan Saya — RGS STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #060810;
            --surface: #0a0e17;
            --card: #111827;
            --neon-orange: #ff9d00;
            --neon-cyan: #00f3ff;
            --neon-green: #00ff88;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Outfit', sans-serif; min-height: 100vh; }

        /* ── Navbar ─────────────────────────────────────── */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid rgba(255,157,0,0.15);
            position: sticky; top: 0; z-index: 40;
            padding: 0 1.5rem;
            height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(12px);
        }
        .navbar-brand {
            font-size: 1.2rem; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        #nav-auth-container { display: flex; align-items: center; gap: 10px; }

        /* ── Content ─────────────────────────────────────── */
        main { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }

        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 2rem; flex-wrap: wrap; gap: 12px;
        }
        .page-title { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -1px; }
        .page-title span { color: var(--neon-orange); }
        .page-subtitle { font-size: 0.75rem; color: #475569; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

        /* ── Loading ─────────────────────────────────────── */
        .spinner-wrap { display: flex; justify-content: center; padding: 5rem 0; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,157,0,0.15);
            border-top-color: var(--neon-orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Empty State ─────────────────────────────────── */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 5rem 2rem;
            background: var(--card); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.3; }
        .empty-title { font-size: 1.2rem; font-weight: 900; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
        .empty-sub { color: #475569; font-size: 0.8rem; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-start { margin-top: 2rem; padding: 12px 32px; background: linear-gradient(135deg, #ff9d00, #ff6b00); color: #000; font-weight: 900; border-radius: 12px; text-decoration: none; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 0 20px rgba(255,157,0,0.4); }

        /* ── Floating WA ─────────────────────────────────── */
        .wa-float {
            position: fixed; bottom: 28px; right: 28px;
            width: 54px; height: 54px; background: #25D366;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #fff; z-index: 9999;
            box-shadow: 0 4px 20px rgba(37,211,102,0.4);
            transition: all 0.2s; text-decoration: none;
        }
        .wa-float:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(37,211,102,0.6); }

        /* ── Custom Scrollbar ──── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,157,0,0.3); border-radius: 99px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">RGS STORE</a>
        <div id="nav-auth-container"></div>
    </nav>

    <main>
        <div class="page-header">
            <div>
                <h1 class="page-title">Pesanan <span>Saya</span></h1>
                <p class="page-subtitle">Riwayat transaksi digital Anda</p>
            </div>
            <a href="index.html" style="padding:10px 22px; background:rgba(255,157,0,0.08); color:var(--neon-orange); border:1px solid rgba(255,157,0,0.2); border-radius:10px; font-size:0.8rem; font-weight:700; text-decoration:none; letter-spacing:1px; text-transform:uppercase;">← Kembali</a>
        </div>

        <div class="spinner-wrap" id="orders-loading">
            <div class="spinner"></div>
        </div>

        <div id="orders-container" style="display:none; flex-direction:column; gap:20px;"></div>

        <div id="orders-empty" style="display:none;">
            <div class="empty-state">
                <div class="empty-icon"><i class="fa-solid fa-box-open"></i></div>
                <div class="empty-title">Belum Ada Pesanan</div>
                <div class="empty-sub">Mulai berbelanja di RGS Store</div>
                <a href="index.html" class="btn-start">Mulai Belanja</a>
            </div>
        </div>
    </main>

    <!-- Floating WA -->
    <a href="https://wa.me/62882016259591" target="_blank" class="wa-float" title="WhatsApp CS">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="js/app.js"></script>
    <script src="js/my-orders.js"></script>
</body>
</html>
