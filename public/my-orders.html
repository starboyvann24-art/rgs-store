<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased min-h-screen">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-br from-orange-500 to-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-orange-500/20">
                    <span class="text-white font-black text-xs">RGS</span>
                </div>
                <span class="font-bold text-xl tracking-tight text-white">RGS<span class="text-orange-500">STORE</span></span>
            </a>
            <div id="nav-auth-container"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="flex flex-col md:flex-row items-end justify-between gap-4 mb-10">
            <div>
                <h1 class="text-4xl font-black text-white">Pesanan Saya</h1>
                <p class="text-slate-400 mt-2">Pantau status dan ambil detail produk pesanan Anda</p>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm font-bold hover:bg-white/10 transition">Kembali Belanja</a>
            </div>
        </div>

        <div id="orders-loading" class="flex justify-center py-20">
            <div class="w-12 h-12 border-4 border-orange-500/20 border-t-orange-500 rounded-full animate-spin"></div>
        </div>

        <div id="orders-container" class="hidden grid grid-cols-1 gap-6">
            <!-- Injected by my-orders.js -->
        </div>

        <div id="orders-empty" class="hidden flex flex-col items-center justify-center py-24 glass-card rounded-3xl border border-white/10">
            <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6">
                <svg class="w-10 h-10 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            </div>
            <h3 class="text-xl font-bold text-white">Belum Ada Pesanan</h3>
            <p class="text-slate-500 mt-2 mb-8">Anda belum melakukan transaksi apapun di toko kami.</p>
            <a href="index.html" class="px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-2xl shadow-xl shadow-orange-500/20 transition-all active:scale-95">Mulai Belanja</a>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/my-orders.js"></script>
</body>
</html>
