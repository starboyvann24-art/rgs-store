<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Cetak Invoice - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
        body { font-family: 'Courier Prime', monospace; background: #e5e7eb; color: #000; padding: 2rem; }
        .invoice-box {
            max-width: 800px;
            margin: auto;
            padding: 30px;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            background: #fff;
        }
        .invoice-box table { width: 100%; line-height: inherit; text-align: left; border-collapse: collapse; }
        .invoice-box table td { padding: 5px; vertical-align: top; }
        .invoice-box table tr.top table td.title { font-size: 45px; line-height: 45px; color: #333; }
        .invoice-box table tr.information table td { padding-bottom: 40px; }
        .invoice-box table tr.heading td { background: #eee; border-bottom: 1px solid #ddd; font-weight: bold; }
        .invoice-box table tr.details td { padding-bottom: 20px; }
        .invoice-box table tr.item td { border-bottom: 1px solid #eee; }
        .invoice-box table tr.item.last td { border-bottom: none; }
        .invoice-box table tr.total td:nth-child(2) { border-top: 2px solid #eee; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="fixed top-4 right-4 no-print flex gap-2">
        <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded shadow font-sans font-bold">🖨️ Print Invoice</button>
        <button onclick="window.close()" class="bg-gray-600 text-white px-4 py-2 rounded shadow font-sans font-bold">❌ Tutup</button>
    </div>

    <div class="invoice-box" id="invoice-content">
        <div class="text-center py-10 font-sans text-xl">Memuat Invoice...</div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('id');
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (!orderId || !token) {
                document.getElementById('invoice-content').innerHTML = '<div class="text-center py-10 text-red-500 font-bold font-sans">Akses Ditolak atau Order Tidak Valid</div>';
                return;
            }

            try {
                // Determine whether user is admin or regular user
                const url = `/api/orders/${orderId}`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!data.success) throw new Error(data.message);

                const order = data.data;
                const dateObj = new Date(order.created_at);
                const formatter = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' });

                // Try parse items if json notes exist
                let itemsList = '';
                try {
                    const notesObj = JSON.parse(order.notes);
                    if (notesObj && notesObj.items && Array.isArray(notesObj.items)) {
                        notesObj.items.forEach(itm => {
                            itemsList += `
                            <tr class="item">
                                <td>${itm.name} (x${itm.qty})</td>
                                <td class="text-right">${formatter.format(itm.total)}</td>
                            </tr>`;
                        });
                    }
                } catch(e) {}
                
                if (!itemsList) {
                    itemsList = `
                    <tr class="item">
                        <td>${order.product_name} (x${order.qty})</td>
                        <td class="text-right">${formatter.format(order.total_price)}</td>
                    </tr>`;
                }

                document.getElementById('invoice-content').innerHTML = `
                    <table cellpadding="0" cellspacing="0">
                        <tr class="top">
                            <td colspan="2">
                                <table>
                                    <tr>
                                        <td class="title">
                                            <div style="font-family: sans-serif; font-weight: 900; font-size: 2rem; color: #22c55e;">RGS <span style="color:#0f172a">STORE</span></div>
                                        </td>
                                        <td class="text-right">
                                            Invoice #: <strong>${order.order_number}</strong><br />
                                            Tanggal: ${dateObj.toLocaleDateString('id-ID')}<br />
                                            Waktu: ${dateObj.toLocaleTimeString('id-ID')}
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <tr class="information">
                            <td colspan="2">
                                <table>
                                    <tr>
                                        <td>
                                            RGS Store Digital Marketplace.<br />
                                            Jakarta, Indonesia<br />
                                            support@rgsstore.com
                                        </td>
                                        <td class="text-right">
                                            <strong>Kepada:</strong><br />
                                            ${order.user_name}<br />
                                            ${order.user_email}<br />
                                            ${order.user_whatsapp || ''}
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <tr class="heading">
                            <td>Metode Pembayaran</td>
                            <td class="text-right">Status</td>
                        </tr>
                        <tr class="details">
                            <td>${order.payment_method.toUpperCase()}</td>
                            <td class="text-right font-bold uppercase">${order.status}</td>
                        </tr>

                        <tr class="heading">
                            <td>Item</td>
                            <td class="text-right">Harga</td>
                        </tr>

                        ${itemsList}

                        <tr class="total">
                            <td></td>
                            <td class="text-right font-bold text-xl pt-4">Total: ${formatter.format(order.total_price)}</td>
                        </tr>
                    </table>
                    
                    <div class="mt-20 text-center text-sm italic text-gray-500 border-t pt-4">
                        Terima kasih telah berbelanja di RGS STORE.<br>Invoice ini sah dan digenerate secara otomatis oleh sistem.
                    </div>
                `;

                // Auto print prompt after a slight delay
                setTimeout(() => window.print(), 1000);

            } catch(e) {
                document.getElementById('invoice-content').innerHTML = `<div class="text-center py-10 text-red-500 font-bold font-sans">Error: ${e.message}</div>`;
            }
        });
    </script>

</body>
</html>
