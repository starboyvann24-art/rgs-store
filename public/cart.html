<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Keranjang - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' }, dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' } }, fontFamily: { sans: ['Outfit','Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-white text-gray-100 font-sans antialiased">

    <!-- Navbar -->
    <nav class="-800/80 backdrop-blur-lg shadow-lg border-b border-primary-500/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center h-16 relative">
                <a href="index.html" class="absolute left-0 flex items-center text-gray-400 hover:text-primary-500 font-medium transition text-sm">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Kembali
                </a>
                <h1 class="mx-auto text-lg font-black  uppercase tracking-widest">Digital Cart</h1>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8 items-start">

            <!-- Cart list -->
            <div class="w-full lg:w-8/12">
                <div class="-800 rounded-3xl shadow-xl border border-primary-500/10 overflow-hidden">
                    <div class="p-4 border-b border-white/10 -700/50 flex justify-between items-center">
                        <span class="font-black text-primary-500 text-[10px] uppercase tracking-widest" id="cart-count-txt">MODS IN CART (0)</span>
                        <button onclick="clearCart()" class="text-[10px] font-black text-red-500 hover:text-red-400 hidden uppercase tracking-widest" id="btn-clear-cart">Purge All</button>
                    </div>
                    <div id="cart-list" class="divide-y divide-white/5"></div>
                    <div id="cart-empty" class="p-16 text-center hidden">
                        <svg class="w-20 h-20 text-gray-200 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                        <h3 class="text-lg font-bold text-gray-600">Keranjangmu Kosong</h3>
                        <p class="text-gray-400 mt-1 mb-6 text-sm">Yuk, cari produk digital impianmu.</p>
                        <a href="index.html" class="inline-block px-6 py-2.5 bg-primary-500  font-semibold rounded-xl shadow hover:bg-primary-600 transition">Mulai Belanja</a>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div class="w-full lg:w-4/12 sticky top-24">
                <div class="-800 rounded-3xl shadow-xl border border-primary-500/10 p-8">
                    <h3 class="font-black  text-lg mb-6 uppercase tracking-widest text-sm border-b border-white/10 pb-4">Extraction Summary</h3>
                    <div class="space-y-4 mb-6 border-b border-white/10 pb-6 text-xs text-gray-400">
                        <div class="flex justify-between">
                            <span>Subtotal (<span id="total-qty">0</span> items)</span>
                            <span id="total-price" class="font-bold ">Rp 0</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Admin Fee</span>
                            <span class="font-bold text-green-400 uppercase">Gratis</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-end mb-8">
                        <span class="font-black text-primary-500 text-[10px] uppercase tracking-tighter">FINAL VALUE</span>
                        <span id="grand-total" class="font-black text-2xl ">Rp 0</span>
                    </div>
                    <a href="checkout.html" id="btn-checkout" class="block w-full bg-primary-500 hover:bg-primary-600 text-black font-black py-4 rounded-xl transition-all shadow-lg shadow-primary-500/20 text-center cursor-not-allowed opacity-50 pointer-events-none uppercase tracking-widest text-xs">
                        Proceed To Checkout
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        function renderCart() {
            const cart = appUtils.getCart();
            const cartList = document.getElementById('cart-list');
            const cartEmpty = document.getElementById('cart-empty');
            const btnClear = document.getElementById('btn-clear-cart');
            const btnCheckout = document.getElementById('btn-checkout');

            let totalQty = 0, totalPrice = 0;
            cartList.innerHTML = '';

            if (cart.length === 0) {
                cartEmpty.classList.remove('hidden');
                btnClear.classList.add('hidden');
                btnCheckout.classList.add('cursor-not-allowed','opacity-50','pointer-events-none');
            } else {
                cartEmpty.classList.add('hidden');
                btnClear.classList.remove('hidden');
                btnCheckout.classList.remove('cursor-not-allowed','opacity-50','pointer-events-none');

                cart.forEach((item, i) => {
                    const itemQty = parseInt(item.qty) || 0;
                    const itemPrice = parseInt(item.price) || 0;
                    
                    totalQty += itemQty;
                    totalPrice += (itemPrice * itemQty);
                    
                    const imgSrc = item.image_url || 'https://via.placeholder.com/64x64?text=N';
                    cartList.insertAdjacentHTML('beforeend', `
                        <div class="px-6 py-5 flex items-center gap-4 hover:bg-gray-50 transition">
                            <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-gray-100 border">
                                <img src="${imgSrc}" alt="${item.name}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-grow min-w-0">
                                <h4 class="font-semibold text-gray-800 text-sm truncate">${item.name}</h4>
                                ${item.variant ? `<p class="text-[10px] inline-block px-2 py-0.5 bg-gray-100 text-gray-500 rounded font-medium mt-0.5 uppercase tracking-wider border">Varian: ${item.variant}</p>` : ''}
                                <p class="font-bold text-primary-600 mt-1 text-sm">${appUtils.formatRupiah(itemPrice)}</p>
                            </div>
                            <div class="flex flex-col items-end gap-2 flex-shrink-0">
                                <button onclick="removeItem(${i})" class="text-gray-400 hover:text-red-500 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                                <div class="flex items-center border rounded-xl overflow-hidden shadow-sm">
                                    <button onclick="updateQty(${i},-1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100">-</button>
                                    <input type="text" readonly class="w-8 h-8 text-center text-sm font-medium bg-transparent outline-none" value="${itemQty}">
                                    <button onclick="updateQty(${i},1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100">+</button>
                                </div>
                            </div>
                        </div>
                    `);
                });
            }

            document.getElementById('cart-count-txt').textContent = 'Keranjang (' + totalQty + ')';
            document.getElementById('total-qty').textContent = totalQty;
            document.getElementById('total-price').textContent = appUtils.formatRupiah(totalPrice);
            document.getElementById('grand-total').textContent = appUtils.formatRupiah(totalPrice);
            appUtils.updateCartBadge();
        }

        function updateQty(index, change) {
            const cart = appUtils.getCart();
            const currentQty = parseInt(cart[index].qty) || 1;
            const newQty = currentQty + change;

            if (newQty < 1) return;

            cart[index].qty = newQty;
            appUtils.saveCart(cart);
            renderCart();
        }

        function removeItem(index) {
            const cart = appUtils.getCart();
            cart.splice(index, 1);
            appUtils.saveCart(cart);
            renderCart();
            appUtils.showToast('Produk dihapus', 'success');
        }

        function clearCart() {
            if (confirm('Yakin hapus semua item?')) { appUtils.saveCart([]); renderCart(); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });
    </script>

</html>
