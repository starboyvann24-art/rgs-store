<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    
    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center h-16 relative">
                <a href="index.html" class="absolute left-4 flex items-center text-gray-500 hover:text-primary-600 font-medium">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <h1 class="mx-auto text-lg font-bold text-gray-800">Keranjang Belanja</h1>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <!-- Cart Items -->
            <div class="w-full lg:w-8/12">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                        <span class="font-semibold text-gray-700" id="cart-count-txt">Item (0)</span>
                        <button onclick="clearCart()" class="text-sm font-medium text-red-500 hover:text-red-600 hidden" id="btn-clear-cart">Hapus Semua</button>
                    </div>
                    
                    <div id="cart-list" class="divide-y divide-gray-100">
                        <!-- Injected Cart Items -->
                    </div>

                    <!-- Empty State -->
                    <div id="cart-empty" class="p-12 text-center hidden">
                        <svg class="w-20 h-20 text-gray-200 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <h3 class="text-lg font-bold text-gray-700">Keranjangmu Kosong</h3>
                        <p class="text-gray-500 mt-1 mb-6 text-sm">Yuk, cari produk digital impianmu sekarang.</p>
                        <a href="index.html" class="inline-block px-6 py-2.5 bg-primary-500 text-white font-semibold rounded-lg shadow hover:bg-primary-600 transition">Mulai Belanja</a>
                    </div>
                </div>
            </div>

            <!-- Ringkasan Belanja -->
            <div class="w-full lg:w-4/12 sticky top-24">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4">Ringkasan Belanja</h3>
                    
                    <div class="space-y-3 mb-6 border-b border-gray-100 pb-4 text-sm">
                        <div class="flex justify-between text-gray-600">
                            <span>Total Harga (<span id="total-qty">0</span> barang)</span>
                            <span id="total-price" class="font-medium text-gray-800">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Biaya Admin</span>
                            <span class="font-medium text-green-500">Gratis</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-end mb-6">
                        <span class="font-bold text-gray-800">Total Tagihan</span>
                        <span id="grand-total" class="font-extrabold text-xl text-primary-600">Rp 0</span>
                    </div>

                    <a href="checkout.html" id="btn-checkout" class="block w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl transition shadow text-center focus:ring-4 focus:ring-primary-100 cursor-not-allowed opacity-50 pointer-events-none">
                        Beli Sekarang
                    </a>
                </div>
            </div>

        </div>

    </main>

    <script src="js/app.js"></script>
    <script>
        function renderCart() {
            const cart = appUtils.getCart();
            const products = appUtils.getProducts();
            
            const cartList = document.getElementById('cart-list');
            const cartEmpty = document.getElementById('cart-empty');
            const btnClear = document.getElementById('btn-clear-cart');
            const btnCheckout = document.getElementById('btn-checkout');
            
            let totalQty = 0;
            let totalPrice = 0;

            cartList.innerHTML = '';

            if (cart.length === 0) {
                cartEmpty.classList.remove('hidden');
                btnClear.classList.add('hidden');
                btnCheckout.classList.add('cursor-not-allowed', 'opacity-50', 'pointer-events-none');
            } else {
                cartEmpty.classList.add('hidden');
                btnClear.classList.remove('hidden');
                btnCheckout.classList.remove('cursor-not-allowed', 'opacity-50', 'pointer-events-none');

                cart.forEach((item, index) => {
                    const dbProduct = products.find(p => p.id === item.id);
                    // Ensure active stock checking
                    const validStock = dbProduct ? dbProduct.stock : 0;
                    
                    if(item.qty > validStock) item.qty = validStock; // fallback fix

                    totalQty += item.qty;
                    totalPrice += (item.price * item.qty);

                    const li = `
                        <div class="px-6 py-5 flex items-center gap-4 hover:bg-gray-50 transition isolate relative">
                            <!-- Image -->
                            <div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-gray-100 border border-gray-200">
                                <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                            </div>
                            <!-- Detail -->
                            <div class="flex-grow">
                                <h4 class="font-semibold text-gray-800 text-sm md:text-base line-clamp-1">${item.name}</h4>
                                ${item.variant ? `<p class="text-xs text-gray-500 mt-0.5">Varian: ${item.variant}</p>` : ''}
                                <p class="font-bold text-primary-600 mt-1">${appUtils.formatRupiah(item.price)}</p>
                            </div>
                            <!-- Action Qty -->
                            <div class="flex flex-col items-end gap-2">
                                <button onclick="removeItem(${index})" class="text-gray-400 hover:text-red-500 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                                <div class="flex items-center border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm">
                                    <button onclick="updateQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition">-</button>
                                    <input type="text" readonly class="w-8 h-8 text-center text-sm font-medium text-gray-800 bg-transparent outline-none focus:outline-none focus:ring-0 select-none pointer-events-none" value="${item.qty}">
                                    <button onclick="updateQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition flex-shrink-0 relative z-20">+</button>
                                </div>
                            </div>
                        </div>
                    `;
                    cartList.insertAdjacentHTML('beforeend', li);
                });
            }

            // Update Summaries
            document.getElementById('cart-count-txt').textContent = `Keranjang (${totalQty})`;
            document.getElementById('total-qty').textContent = totalQty;
            document.getElementById('total-price').textContent = appUtils.formatRupiah(totalPrice);
            document.getElementById('grand-total').textContent = appUtils.formatRupiah(totalPrice);
            appUtils.updateCartBadge();
        }

        function updateQty(index, change) {
            const cart = appUtils.getCart();
            const products = appUtils.getProducts();
            
            const item = cart[index];
            const dbProduct = products.find(p => p.id === item.id);
            
            if(!dbProduct) return;
            
            const newQty = item.qty + change;
            
            if (newQty < 1) return;
            
            if (newQty > dbProduct.stock) {
                appUtils.showToast(`Stok ${dbProduct.name} hanya tersisa ${dbProduct.stock}`, 'error');
                return;
            }

            cart[index].qty = newQty;
            appUtils.saveCart(cart);
            renderCart();
        }

        function removeItem(index) {
            const cart = appUtils.getCart();
            cart.splice(index, 1);
            appUtils.saveCart(cart);
            renderCart();
            appUtils.showToast('Produk dihapus dari keranjang', 'success');
        }

        function clearCart() {
            if(confirm("Yakin ingin menghapus semua item?")) {
                appUtils.saveCart([]);
                renderCart();
            }
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
