<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RGS STORE - Marketplace produk digital premium terlengkap.">
    <meta name="keywords" content="Netflix, Spotify, Discord Nitro, Pterodactyl">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RGS STORE — Premium Digital">
    <title>Masuk / Daftar - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { 50:'#ecfeff',100:'#cffafe',500:'#06b6d4',600:'#0891b2',700:'#0e7490' },
              secondary: { 500: '#d946ef' },
              dark: { 900: '#000000', 800: '#0b0e14', 700: '#111827' }
            },
            fontFamily: { sans: ['Outfit', 'Inter', 'sans-serif'] }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-white text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="-800 p-8 rounded-3xl shadow-2xl w-full max-w-md relative overflow-hidden border border-primary-500/10">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary-500/10 rounded-full mix-blend-screen filter blur-3xl opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-secondary-500/10 rounded-full mix-blend-screen filter blur-3xl opacity-50"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <a href="index.html" class="inline-block mb-4">
                    <h1 class="text-3xl font-black text-primary-500 tracking-tighter uppercase">RGS <span class="">STORE</span></h1>
                </a>
                <p class="text-[10px] text-gray-500 font-black tracking-widest uppercase">System Protocol: Identity Extraction</p>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-white/5 mb-6">
                <button id="tab-login" class="flex-1 py-3 font-black text-xs uppercase tracking-widest text-primary-500 border-b-2 border-primary-500 focus:outline-none transition-all" onclick="switchTab('login')">Access</button>
                <button id="tab-register" class="flex-1 py-3 font-black text-xs uppercase tracking-widest text-gray-600 border-b-2 border-transparent hover:text-gray-300 focus:outline-none transition-all" onclick="switchTab('register')">Link</button>
            </div>

            <!-- Login Form -->
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Neuro Mail</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-3 -900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500  outline-none transition placeholder-gray-700" placeholder="EXTRACTION@MAIL.COM">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Access Cipher</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-3 -900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500  outline-none transition placeholder-gray-700" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-primary-500 text-black font-black py-3.5 rounded-xl shadow-lg shadow-primary-500/20 hover:bg-primary-600 hover:scale-[1.02] transition-all mt-4 uppercase tracking-[0.2em] text-xs">Execute Login</button>
            </form>

            <!-- Register Form -->
            <form id="form-register" class="space-y-4 hidden">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Identify Protocol</label>
                    <input type="text" id="reg-name" required class="w-full px-4 py-3 -900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500  outline-none transition placeholder-gray-700" placeholder="FULL NAME">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Neuro Mail</label>
                    <input type="email" id="reg-email" required class="w-full px-4 py-3 -900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500  outline-none transition placeholder-gray-700" placeholder="EXTRACTION@MAIL.COM">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Access Cipher</label>
                    <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3 -900 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary-500  outline-none transition placeholder-gray-700" placeholder="MIN 6 CHARACTERS">
                </div>
                <button type="submit" class="w-full bg-primary-500 text-black font-black py-3.5 rounded-xl shadow-lg shadow-primary-500/20 hover:bg-primary-600 hover:scale-[1.02] transition-all mt-4 uppercase tracking-[0.2em] text-xs">Link Neural Account</button>
            </form>

            <!-- Hint -->
            <div class="mt-6 text-[10px] text-center text-gray-500 -900/50 p-4 rounded-xl border border-white/5 uppercase tracking-widest font-black">
                <p>System Bypass: <span class="text-primary-500">admin@rgsstore.com</span> / <span class="text-primary-500">admin123</span></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.className = "flex-1 py-3 font-black text-xs uppercase tracking-widest text-primary-500 border-b-2 border-primary-500 focus:outline-none transition-all";
                tabRegister.className = "flex-1 py-3 font-black text-xs uppercase tracking-widest text-gray-600 border-b-2 border-transparent hover:text-gray-300 focus:outline-none transition-all";
            } else {
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                tabRegister.className = "flex-1 py-3 font-black text-xs uppercase tracking-widest text-primary-500 border-b-2 border-primary-500 focus:outline-none transition-all";
                tabLogin.className = "flex-1 py-3 font-black text-xs uppercase tracking-widest text-gray-600 border-b-2 border-transparent hover:text-gray-300 focus:outline-none transition-all";
            }
        }

        // Redirect if already logged in
        if (appUtils.isLoggedIn()) {
            const user = appUtils.getSavedUser();
            window.location.href = user && user.role === 'admin' ? 'admin.html' : 'index.html';
        }

        // Login handler
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');

            appUtils.setLoading(btn, true, 'Masuk...');

            const result = await appUtils.login(
                document.getElementById('login-email').value,
                document.getElementById('login-password').value
            );

            if (result.success) {
                appUtils.showToast('Login berhasil!', 'success');
                setTimeout(() => {
                    const user = result.data.user;
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                }, 800);
            } else {
                appUtils.showToast(result.message || 'Login gagal', 'error');
                appUtils.setLoading(btn, false);
            }
        });

        // Register handler
        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');

            appUtils.setLoading(btn, true, 'Daftar...');

            const result = await appUtils.register(
                document.getElementById('reg-name').value,
                document.getElementById('reg-email').value,
                document.getElementById('reg-password').value
            );

            if (result.success) {
                appUtils.showToast('Registrasi berhasil!', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } else {
                appUtils.showToast(result.message || 'Registrasi gagal', 'error');
                appUtils.setLoading(btn, false);
            }
        });
    </script>
