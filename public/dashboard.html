<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RGS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d' } }, fontFamily: { sans: ['Inter','sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-lg shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-2xl font-extrabold text-primary-600 tracking-tighter">RGS <span class="text-gray-800">STORE</span></a>
                <div class="flex items-center gap-4">
                    <span id="user-greeting" class="font-medium text-gray-700 text-sm hidden md:inline">Halo!</span>
                    <button onclick="appUtils.logout()" class="text-xs font-semibold text-red-500 hover:text-red-700 px-3 py-1.5 rounded-xl border border-red-100 hover:bg-red-50 transition">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="flex flex-col lg:flex-row gap-6">

            <!-- Sidebar -->
            <div class="w-full lg:w-1/4">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden sticky top-24">
                    <div class="p-6 border-b text-center bg-primary-50">
                        <div class="w-16 h-16 rounded-full bg-primary-200 text-primary-600 mx-auto flex items-center justify-center text-xl font-bold mb-3 shadow-inner" id="user-avatar">U</div>
                        <h2 class="font-bold text-gray-800" id="user-fullname">User</h2>
                        <p class="text-xs text-gray-500" id="user-email-text">-</p>
                    </div>
                    <ul class="p-3 space-y-1">
                        <li>
                            <button onclick="switchTab('orders')" id="btn-tab-orders" class="dash-tab w-full flex items-center px-4 py-3 rounded-xl text-primary-600 font-medium bg-primary-50 transition">
                                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                                Pesanan Saya
                            </button>
                        </li>
                        <li>
                            <button onclick="switchTab('chat')" id="btn-tab-chat" class="dash-tab w-full flex items-center px-4 py-3 rounded-xl text-gray-600 font-medium hover:bg-gray-50 transition">
                                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                                Hubungi CS (Chat)
                            </button>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Content -->
            <div class="w-full lg:w-3/4">
                
                <!-- TAB: Orders -->
                <div id="tab-orders" class="tab-content block">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Riwayat Pesanan</h2>
                        <div id="orders-container" class="space-y-4"></div>
                        <div id="orders-empty" class="text-center py-16 hidden">
                            <svg class="w-20 h-20 text-gray-200 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            <h3 class="text-lg font-bold text-gray-600">Belum ada pesanan</h3>
                            <p class="text-gray-400 mt-1 mb-6 text-sm">Ayo mulai belanja!</p>
                            <a href="index.html" class="inline-block px-6 py-2.5 bg-primary-500 text-white font-semibold rounded-xl shadow hover:bg-primary-600 transition">Belanja Sekarang</a>
                        </div>
                    </div>
                </div>

                <!-- TAB: Chat -->
                <div id="tab-chat" class="tab-content hidden">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Chat Customer Service</h2>
                        <div class="bg-gray-50 rounded-2xl border overflow-hidden flex flex-col h-[500px]">
                            <div class="p-4 bg-primary-600 text-white flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center font-bold">CS</div>
                                    <div>
                                        <p class="font-bold text-sm">RGS Store Support</p>
                                        <p class="text-[10px] opacity-80">Aktif membalas pesan</p>
                                    </div>
                                </div>
                            </div>
                            <div id="chat-messages" class="flex-grow p-4 overflow-y-auto space-y-4">
                                <div class="bg-blue-50 text-blue-700 p-3 rounded-lg text-xs italic">Silakan kirim pesan mengenai kendala pesanan Anda. Admin akan membalas di sini.</div>
                            </div>
                            <div class="p-4 bg-white border-t flex gap-2">
                                <input type="text" id="chat-input" placeholder="Tulis pesan..." class="flex-grow border rounded-full px-4 py-2 outline-none focus:ring-2 focus:ring-primary-500">
                                <button onclick="sendMessage()" class="bg-primary-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-primary-700 shadow-lg transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    </main>

    <!-- Footer -->
    <footer class="mt-16 bg-white border-t py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-xs text-gray-500 font-medium">Created with 💚 by <span class="font-bold text-primary-600">Evan</span> | RGS STORE © 2026</p>
        </div>
    </footer>

    <!-- Floating Buttons (Standard CSS assumes FontAwesome is loaded, if not, icons may not show, but buttons stay functional) -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-3 z-40">
        <a href="https://wa.me/62882016259591" target="_blank" class="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition" title="Chat WhatsApp">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.432h.004c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </a>
        <button onclick="store.openTicketModal()" class="w-12 h-12 bg-gray-800 text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition" title="Buat Tiket Bantuan">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
    </div>

    <!-- Core Logic -->
    <script src="js/app.js"></script>
    <script>
        const userState = {
            orders: [],
            messages: []
        };

        // --- RENDERERS (STRICT DOM CLEARING) ---
        const Render = {
            orders() {
                const ctn = document.getElementById('orders-container');
                const empty = document.getElementById('orders-empty');
                if (!ctn || !empty) return;
                
                ctn.innerHTML = ''; // CEGAH DUPLIKASI
                
                if (!userState.orders.length) {
                    empty.classList.remove('hidden');
                    return;
                }
                empty.classList.add('hidden');

                userState.orders.forEach(o => {
                    const badge = appUtils.getStatusBadge(o.status);
                    const isDone = o.status === 'success' || o.status === 'shipped';
                    
                    const html = `
                        <div class="border border-gray-200 rounded-xl p-5 hover:border-gray-300 transition bg-white shadow-sm">
                            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 border-b pb-4 mb-4">
                                <div><span class="font-bold text-gray-800">#${o.order_number}</span><p class="text-xs text-gray-500 mt-0.5">${appUtils.formatDate(o.created_at)}</p></div>
                                ${badge}
                            </div>
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div><p class="font-semibold text-gray-800">${o.product_name}</p><p class="text-xs text-gray-500 mt-0.5">Jumlah: ${o.qty} · Metode: ${o.payment_method}</p></div>
                                <div class="text-right">
                                    <p class="font-extrabold text-primary-600 text-lg">${appUtils.formatRupiah(o.total_price)}</p>
                                    ${isDone ? `<button data-action="open-review" data-id="${o.id}" data-pid="${o.product_id}" data-pname="${o.product_name.replace(/'/g,"\\'").replace(/"/g, '&quot;')}" class="text-[10px] font-bold text-orange-500 hover:underline mt-1">⭐️ Tulis Ulasan</button>` : ''}
                                </div>
                            </div>
                            ${o.credentials ? `
                            <div class="mt-4 p-3 bg-gray-900 rounded-lg border border-primary-500/30 flex items-center justify-between gap-3">
                                <div class="overflow-hidden">
                                    <label class="block text-[10px] uppercase font-black text-primary-500 mb-1 tracking-widest">Akses / Kredensial Produk:</label>
                                    <div class="font-mono text-xs text-green-400 truncate">${o.credentials}</div>
                                </div>
                                <button data-action="copy-text" data-text="${o.credentials.replace(/'/g, "\\'").replace(/"/g, '&quot;')}" class="flex-shrink-0 bg-primary-500 hover:bg-primary-600 text-black px-3 py-1.5 rounded-lg text-[10px] font-bold transition">SALIN</button>
                            </div>` : ''}
                        </div>`;
                    ctn.insertAdjacentHTML('beforeend', html);
                });
            },

            chat() {
                const box = document.getElementById('chat-messages');
                if (!box) return;
                
                box.innerHTML = '<div class="bg-blue-50 text-blue-700 p-3 rounded-lg text-xs italic">Silakan kirim pesan mengenai kendala pesanan Anda. Admin akan membalas di sini.</div>';
                
                userState.messages.forEach(m => {
                    const isMe = m.is_admin === 0;
                    const html = `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-fade-in">
                            <div class="max-w-[85%] rounded-2xl px-4 py-2 text-sm shadow-sm ${isMe ? 'bg-primary-600 text-white rounded-tr-none' : 'bg-white border text-gray-800 rounded-tl-none'}">
                                ${m.message}
                                <div class="text-[10px] mt-1 opacity-60 text-right font-mono">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                            </div>
                        </div>`;
                    box.insertAdjacentHTML('beforeend', html);
                });
                box.scrollTop = box.scrollHeight;
            }
        };

        // --- ACTIONS ---
        const Actions = {
            async loadOrders() {
                try {
                    userState.orders = await appUtils.getMyOrders() || [];
                    Render.orders();
                } catch (e) { console.error('Orders load error:', e); }
            },
            async loadChat() {
                try {
                    userState.messages = await appUtils.getMyMessages() || [];
                    Render.chat();
                } catch (e) { console.error('Chat load error:', e); }
            }
        };

        // --- GLOBAL EVENT DELEGATION ---
        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('button, [data-action]');
            if (!btn) return;
            const action = btn.dataset.action;

            if (action === 'switch-tab') {
                const tabId = btn.dataset.tab;
                switchTab(tabId);
            }

            if (action === 'copy-text') {
                appUtils.copyToClipboard(btn.dataset.text);
            }

            if (action === 'open-review') {
                const { id, pid, pname } = btn.dataset;
                const rating = prompt(`Berikan rating untuk "${pname}" (1-5):`, "5");
                if (!rating || isNaN(rating) || rating < 1 || rating > 5) return;
                const comment = prompt(`Tulis ulasan singkat Anda:`, "Mantap, proses cepat!");
                if (!comment) return;
                
                const res = await appUtils.createReview(id, rating, comment);
                if (res.success) appUtils.showToast('✅ Ulasan berhasil dikirim!', 'success');
                else appUtils.showToast(res.message, 'error');
            }

            if (action === 'send-chat') {
                const input = document.getElementById('chat-input');
                const msg = input.value.trim();
                if (!msg) return;
                const res = await appUtils.sendMessage(msg);
                if (res.success) {
                    input.value = '';
                    Actions.loadChat();
                }
            }
        });

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');

            document.querySelectorAll('.dash-tab').forEach(btn => {
                btn.classList.remove('text-primary-600', 'bg-primary-50');
                btn.classList.add('text-gray-600');
            });
            const activeBtn = document.getElementById('btn-tab-' + tabId);
            if (activeBtn) {
                activeBtn.classList.add('text-primary-600', 'bg-primary-50');
                activeBtn.classList.remove('text-gray-600');
            }

            if (tabId === 'chat') Actions.loadChat();
        };

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            if (!appUtils.isLoggedIn()) { window.location.href = 'login.html'; return; }
            const user = appUtils.getSavedUser();
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.role === 'admin') { window.location.href = 'admin.html'; return; }

            document.getElementById('user-greeting').textContent = 'Halo, ' + user.name.split(' ')[0] + '!';
            document.getElementById('user-fullname').textContent = user.name;
            document.getElementById('user-email-text').textContent = user.email;
            document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();

            // Link Nav Buttons to Delegation
            document.querySelectorAll('.dash-tab').forEach(btn => {
                const tabId = btn.id.replace('btn-tab-', '');
                btn.setAttribute('data-action', 'switch-tab');
                btn.setAttribute('data-tab', tabId);
                btn.removeAttribute('onclick');
            });

            // Link Navbar Brand & Logout
            // appUtils.logout is already global, but let's make it data-action for consistency if we wanted.
            
            // Link Chat Send
            const chatBtn = document.querySelector('#tab-chat button');
            if (chatBtn) {
                chatBtn.setAttribute('data-action', 'send-chat');
                chatBtn.removeAttribute('onclick');
            }

            Actions.loadOrders();

            // Auto refresh chat
            setInterval(() => {
                const chatTab = document.getElementById('tab-chat');
                if (chatTab && !chatTab.classList.contains('hidden')) {
                    Actions.loadChat();
                }
            }, 10000);
        });
    </script>
</body>
</html>
</body>
</html>
